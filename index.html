<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aaradhya Pharmaceuticals Ordering</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{font-family:Poppins;margin:0;background:#f4f6f9}

header{
background:#0b5ed7;color:white;padding:14px 20px;
display:flex;justify-content:space-between;align-items:center;
position:sticky;top:0;z-index:10
}

.version{
background:white;color:#0b5ed7;padding:4px 10px;border-radius:6px;font-size:13px
}

.cart-btn{
background:#25D366;border:none;color:white;padding:6px 10px;border-radius:6px;cursor:pointer
}

.container{padding:20px;max-width:1400px;margin:auto}

.filters{display:flex;gap:10px;margin-bottom:10px}

input,select{
padding:10px;border-radius:6px;border:1px solid #ccc
}

.grid{
display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:18px
}

.card{
background:white;padding:14px;border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);display:flex;flex-direction:column;gap:6px
}

.medicine{font-weight:600;font-size:14px}

.company{font-size:12px;color:#666}

.details{font-size:12px}

.qty{display:flex;justify-content:center;gap:6px;margin-top:6px}

.qty button{width:26px;height:26px}

.badge{font-size:11px;padding:3px 6px;border-radius:4px}

.stock-good{background:#e8f8f0;color:#1e8449}
.stock-mid{background:#fff3cd;color:#856404}
.stock-low{background:#fdecea;color:#c0392b}
.expired{background:#f8d7da;color:#c0392b}

.pagination{
display:flex;justify-content:center;gap:6px;margin-top:20px;flex-wrap:wrap
}

.active-page{background:#25D366}

.cart-drawer{
position:fixed;right:-400px;top:0;width:350px;height:100%;
background:white;box-shadow:-3px 0 12px rgba(0,0,0,0.2);
padding:20px;transition:0.3s;z-index:20;overflow:auto
}

.cart-drawer.open{right:0}

.cart table{width:100%;border-collapse:collapse;font-size:13px}

.cart td,.cart th{padding:6px;border-bottom:1px solid #eee}

.cart-total{margin-top:10px;font-weight:600}

.order-btn{background:#25D366;width:100%;margin-top:10px}

.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);display:none;
justify-content:center;align-items:center
}

.modal-content{
background:white;padding:20px;border-radius:10px;width:350px
}

.tab-buttons{display:flex;gap:6px;margin-bottom:10px}

.tab-btn{background:#e9ecef;border:none;padding:6px 10px;border-radius:6px}

.tab-btn.active{background:#0b5ed7;color:white}

.tab-panel{display:none;font-size:12px}

.tab-panel.active{display:block}

</style>
</head>

<body>

<header>

<div>Aaradhya Pharmaceuticals Ordering</div>

<div style="display:flex;gap:10px;align-items:center">

<div class="version">Version 9.3</div>

<button class="cart-btn" onclick="toggleCart()">
🛒 Cart (<span id="cartCount">0</span>) ₹<span id="cartTotal">0</span>
</button>

</div>

</header>

<div class="container">

<div class="filters">
<input id="search" placeholder="Search medicine">
<select id="companyFilter"><option value="">All Companies</option></select>
</div>

<div class="tab-buttons">
<button class="tab-btn active" onclick="openTab(event,'topTab')">Top Ordered</button>
<button class="tab-btn" onclick="openTab(event,'stockTab')">Low Stock</button>
<button class="tab-btn" onclick="openTab(event,'expiryTab')">Expiry Risk</button>
</div>

<div class="tab-panel active" id="topTab"><div id="topItems"></div></div>
<div class="tab-panel" id="stockTab"><div id="lowStock"></div></div>
<div class="tab-panel" id="expiryTab"><div id="expiryRisk"></div></div>

<div class="grid" id="grid"></div>

<div class="pagination" id="pagination"></div>

</div>

<!-- CART -->

<div class="cart-drawer cart" id="cartDrawer">

<h3>Your Cart</h3>

<table>
<thead>
<tr><th>Item</th><th>Qty</th><th>Total</th></tr>
</thead>
<tbody id="cartItems"></tbody>
</table>

<div class="cart-total" id="total">Total ₹0</div>

<button class="order-btn" onclick="openReview()">Place Order</button>

</div>

<!-- REVIEW -->

<div class="modal" id="reviewModal">

<div class="modal-content">

<h3>Review Order</h3>

<div id="reviewList"></div>

<br>

<button onclick="confirmOrder()">Confirm</button>
<button onclick="closeReview()">Cancel</button>

</div>

</div>

<script>

const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSHk_KwG4YCKte3jjsuGsXf_vPG_RsPQRexmJl_fIs0_Pjasq7I7g6nlxXskgncP6Xg6ca9__obX-5d/pub?gid=0&single=true&output=csv"

const ORDER_API="https://script.google.com/macros/s/AKfycby3QoqXU5UI_ofm_NX6F7wH4X84hAwArPFMZ4BOkn1KmRs0JpLFRJO91f63YSmupgejOg/exec"

let rows=[]
let cart={}
let orderStats={}
let currentPage=1
let itemsPerPage=20

function cleanItemName(name){
return name.replace(/^[0-9]+\s*[\.\-\)]?\s*/,'').trim()
}

fetch(SHEET_URL)
.then(r=>r.text())
.then(data=>{
rows=data.split("\n").slice(1).map(r=>r.split(","))
initCompanyFilter()
render()
updateInsights()
})

function initCompanyFilter(){
let companies=[...new Set(rows.map(r=>r[0]))]
let select=document.getElementById("companyFilter")
companies.forEach(c=>{
let opt=document.createElement("option")
opt.value=c
opt.textContent=c
select.appendChild(opt)
})
}

function render(){

let search=document.getElementById("search").value?.toLowerCase()||""
let company=document.getElementById("companyFilter").value

let filtered=rows.filter(r=>{
let item=cleanItemName(r[1]).toLowerCase()
return item.includes(search)&&(!company||r[0]==company)
})

let start=(currentPage-1)*itemsPerPage
let pageItems=filtered.slice(start,start+itemsPerPage)

let html=""

pageItems.forEach(r=>{

let item=cleanItemName(r[1])
let stock=parseInt(r[5])
let rate=parseFloat(r[6])
let mrp=r[3]
let batch=r[2]
let expiry=r[4]

html+=`
<div class="card">

<div class="medicine">${item}</div>
<div class="company">${r[0]}</div>

<div class="details">MRP: ₹${mrp}</div>
<div class="details">Rate: ₹${rate}</div>
<div class="details">Batch: ${batch}</div>
<div class="details">Expiry: ${expiry}</div>

<div class="qty">
<button onclick="add('${item}',${rate},-1)">-</button>
<span>${cart[item]?.qty||0}</span>
<button onclick="add('${item}',${rate},1)">+</button>
</div>

</div>
`
})

document.getElementById("grid").innerHTML=html

renderPagination(filtered.length)

}

function renderPagination(total){

let pages=Math.ceil(total/itemsPerPage)
let html=""

for(let i=1;i<=pages;i++){

html+=`<button class="${i==currentPage?'active-page':''}" onclick="goPage(${i})">${i}</button>`

}

document.getElementById("pagination").innerHTML=html

}

function goPage(p){
currentPage=p
render()
}

function add(item,rate,change){

if(!cart[item]) cart[item]={qty:0,rate:rate}

cart[item].qty=Math.max(cart[item].qty+change,0)

updateCart()
}

function updateCart(){

let html=""
let total=0
let count=0

for(let item in cart){

let q=cart[item].qty
let r=cart[item].rate

if(q>0){

let t=q*r
total+=t
count+=q

html+=`<tr><td>${item}</td><td>${q}</td><td>₹${t}</td></tr>`

}

}

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText="Total ₹"+total
document.getElementById("cartCount").innerText=count
document.getElementById("cartTotal").innerText=total

}

function toggleCart(){
document.getElementById("cartDrawer").classList.toggle("open")
}

function openReview(){

let html=""

for(let item in cart){
if(cart[item].qty>0){
html+=`${item} - ${cart[item].qty}<br>`
}
}

document.getElementById("reviewList").innerHTML=html
document.getElementById("reviewModal").style.display="flex"

}

function closeReview(){
document.getElementById("reviewModal").style.display="none"
}

function confirmOrder(){

let shop="Retailer"
let mobile=""

let items=[]

for(let item in cart){
if(cart[item].qty>0){
items.push({
name:item,
rate:cart[item].rate,
qty:cart[item].qty,
total:cart[item].rate*cart[item].qty
})
}
}

fetch(ORDER_API,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({shop:shop,mobile:mobile,items:items})
})

alert("Order submitted successfully")

cart={}
updateCart()
closeReview()

}

function openTab(event,tabId){

document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"))
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"))

document.getElementById(tabId).classList.add("active")
event.target.classList.add("active")

}

</script>

</body>
</html>
