<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aaradhya Pharmaceuticals</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter,system-ui,Arial;
margin:0;
background:#f4f6f9
}

header{
background:#0b5ed7;
color:white;
padding:14px 20px;
display:flex;
justify-content:space-between;
align-items:center
}

.cart-btn{
background:#25D366;
border:none;
color:white;
padding:8px 12px;
border-radius:6px;
cursor:pointer
}

.container{
padding:20px;
max-width:1600px;
margin:auto
}

.top-panel{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:16px;
box-shadow:0 3px 8px rgba(0,0,0,0.08)
}

.top-items{
display:flex;
flex-wrap:wrap;
gap:8px
}

.top-item{
background:#eef1f5;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:13px
}

.filters{
display:flex;
gap:10px;
margin-bottom:10px;
flex-wrap:wrap
}

input,select{
padding:10px;
border-radius:6px;
border:1px solid #ccc
}

.inventory-filters{
display:flex;
gap:8px;
margin-bottom:14px
}

.inv-btn{
padding:8px 10px;
border:none;
background:#e9ecef;
border-radius:6px;
cursor:pointer
}

.inv-btn.active{
background:#0b5ed7;
color:white
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px
}

.card{
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.08)
}

.medicine{font-weight:600}
.company{font-size:12px;color:#666}
.details{font-size:12px}

.stock-good{color:#27ae60;font-weight:600}
.stock-mid{color:#f39c12;font-weight:600}
.stock-low{color:#e74c3c;font-weight:600}

.qty{
display:flex;
justify-content:center;
gap:6px;
margin-top:8px
}

.qty button{
width:26px;
height:26px
}

.cart-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
display:none
}

.cart-overlay.active{display:block}

.cart-drawer{
position:fixed;
right:-360px;
top:0;
width:340px;
height:100%;
background:white;
padding:20px;
transition:0.3s;
overflow:auto
}

.cart-drawer.open{right:0}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:320px
}

</style>
</head>

<body>

<header>

<div>Aaradhya Pharmaceuticals</div>

<button class="cart-btn" onclick="toggleCart()">
Cart (<span id="cartCount">0</span>)
</button>

</header>

<div class="container">

<div class="top-panel">
<b>Top Ordered</b>
<div class="top-items" id="topItems"></div>
</div>

<div class="filters">

<input id="search" placeholder="Search medicine">

<select id="companyFilter">
<option value="">All Companies</option>
</select>

</div>

<div class="inventory-filters">

<button class="inv-btn active" onclick="setView('all')" id="btn-all">All</button>
<button class="inv-btn" onclick="setView('low')" id="btn-low">Low Stock</button>
<button class="inv-btn" onclick="setView('expiry')" id="btn-expiry">Expiry Risk</button>

</div>

<div class="grid" id="grid"></div>

</div>

<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>

<div class="cart-drawer" id="cartDrawer">

<h3>Your Cart</h3>

<div id="cartItems"></div>

<br>

<button onclick="openReview()">Place Order</button>

</div>

<div class="modal" id="reviewModal">

<div class="modal-content">

<h3>Confirm Order</h3>

<div id="reviewList"></div>

<br>

<input id="shopName" placeholder="Shop Name"><br><br>
<input id="phoneNumber" placeholder="Phone Number"><br><br>

<button onclick="confirmOrder()">Confirm</button>
<button onclick="closeReview()">Cancel</button>

</div>

</div>

<script>

const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSHk_KwG4YCKte3jjsuGsXf_vPG_RsPQRexmJl_fIs0_Pjasq7I7g6nlxXskgncP6Xg6ca9__obX-5d/pub?gid=0&single=true&output=csv"

const ORDER_API="https://script.google.com/macros/s/AKfycby3QoqXU5UI_ofm_NX6F7wH4X84hAwArPFMZ4BOkn1KmRs0JpLFRJO91f63YSmupgejOg/exec"

let rows=[]
let cart={}
let currentView="all"

fetch(SHEET_URL)
.then(r=>r.text())
.then(data=>{
rows=data.split("\n").slice(1).map(r=>r.split(","))
initCompanies()
initTopItems()
render()
})

function initCompanies(){

let companies=[...new Set(rows.map(r=>r[0]))]

let select=document.getElementById("companyFilter")

companies.forEach(c=>{
let o=document.createElement("option")
o.value=c
o.textContent=c
select.appendChild(o)
})

}

function initTopItems(){

let html=""

rows.slice(0,8).forEach(r=>{

html+=`<div class="top-item" onclick="add('${r[1]}',${r[6]},1)">${r[1]}</div>`

})

document.getElementById("topItems").innerHTML=html

}

function setView(v){

currentView=v

document.querySelectorAll(".inv-btn").forEach(b=>b.classList.remove("active"))

document.getElementById("btn-"+v).classList.add("active")

render()

}

function render(){

let html=""

rows.forEach(r=>{

let name=r[1]
let stock=parseInt(r[5])
let rate=parseFloat(r[6])
let expiry=new Date(r[4])

if(currentView==="low" && stock>=10) return

if(currentView==="expiry"){

let diff=(expiry-new Date())/(1000*60*60*24)

if(diff>90 || diff<0) return

}

let stockClass="stock-good"

if(stock<10) stockClass="stock-low"
else if(stock<25) stockClass="stock-mid"

html+=`

<div class="card">

<div class="medicine">${name}</div>

<div class="company">${r[0]}</div>

<div class="details">MRP ₹${r[3]}</div>
<div class="details">Batch ${r[2]}</div>
<div class="details">Expiry ${r[4]}</div>

<div class="${stockClass}">Stock ${stock}</div>

<div class="qty">
<button onclick="add('${name}',${rate},-1)">−</button>
<span id="qty-${name}">${cart[name]?.qty||0}</span>
<button onclick="add('${name}',${rate},1)">+</button>
</div>

</div>

`

})

document.getElementById("grid").innerHTML=html

}

function add(item,rate,change){

if(!cart[item]) cart[item]={qty:0,rate:rate}

cart[item].qty=Math.max(cart[item].qty+change,0)

updateCart()

let el=document.getElementById("qty-"+item)

if(el) el.innerText=cart[item].qty

}

function updateCart(){

let html=""
let count=0

for(let i in cart){

if(cart[i].qty>0){

count+=cart[i].qty

html+=i+" x "+cart[i].qty+"<br>"

}

}

document.getElementById("cartItems").innerHTML=html
document.getElementById("cartCount").innerText=count

}

function toggleCart(){

document.getElementById("cartDrawer").classList.toggle("open")
document.getElementById("cartOverlay").classList.toggle("active")

}

function openReview(){

toggleCart()

let html=""

for(let i in cart){

if(cart[i].qty>0){

html+=i+" x "+cart[i].qty+"<br>"

}

}

document.getElementById("reviewList").innerHTML=html

document.getElementById("reviewModal").style.display="flex"

}

function closeReview(){

document.getElementById("reviewModal").style.display="none"

}

function confirmOrder(){

let shop=document.getElementById("shopName").value
let phone=document.getElementById("phoneNumber").value

let items=[]

for(let i in cart){

if(cart[i].qty>0){

items.push({
name:i,
qty:cart[i].qty,
rate:cart[i].rate
})

}

}

fetch(ORDER_API,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
shop:shop,
mobile:phone,
items:items
})
})

alert("Order placed")

cart={}
updateCart()
closeReview()

}

</script>

</body>
</html>
