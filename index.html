<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aaradhya Pharmaceuticals Ordering</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter,system-ui,Arial;
margin:0;
background:#f4f6f9
}

header{
background:#0b5ed7;
color:white;
padding:14px 20px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:10
}

.cart-btn{
background:#25D366;
border:none;
color:white;
padding:8px 12px;
border-radius:6px;
cursor:pointer
}

.container{
padding:20px;
max-width:1600px;
margin:auto
}

.filters{
display:flex;
gap:10px;
margin-bottom:12px;
flex-wrap:wrap
}

input,select{
padding:12px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px
}

.card{
background:white;
padding:14px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
gap:6px
}

.medicine{font-weight:600;font-size:14px}
.company{font-size:12px;color:#666}
.details{font-size:12px}

.qty{
display:flex;
justify-content:center;
gap:6px;
margin-top:6px;
align-items:center
}

.qty button{
width:28px;
height:28px;
cursor:pointer
}

.pagination{
display:flex;
justify-content:center;
gap:6px;
margin-top:20px;
flex-wrap:wrap
}

.page-btn{
padding:6px 10px;
border:none;
background:#ddd;
border-radius:4px;
cursor:pointer
}

.active-page{
background:#25D366;
color:white
}

.cart-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
display:none;
z-index:40
}

.cart-overlay.active{display:block}

.cart-drawer{
position:fixed;
right:-400px;
top:0;
width:360px;
max-width:90%;
height:100%;
background:white;
box-shadow:-3px 0 12px rgba(0,0,0,0.25);
padding:20px;
transition:0.3s;
z-index:50;
overflow:auto
}

.cart-drawer.open{right:0}

.cart-header{
display:flex;
justify-content:space-between;
align-items:center
}

.close-cart{
cursor:pointer;
font-size:18px;
font-weight:bold
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:350px;
max-width:90%
}

@media(max-width:600px){

.container{padding:12px}

.filters{flex-direction:column}

input,select{width:100%}

}

</style>
</head>

<body>

<header>

<div>Aaradhya Pharmaceuticals Ordering</div>

<button class="cart-btn" onclick="toggleCart()">
🛒 Cart (<span id="cartCount">0</span>)
</button>

</header>

<div class="container">

<div class="filters">

<input id="search" placeholder="Search medicine">

<select id="companyFilter">
<option value="">All Companies</option>
</select>

</div>

<div class="grid" id="grid"></div>

<div class="pagination" id="pagination"></div>

</div>

<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>

<div class="cart-drawer cart" id="cartDrawer">

<div class="cart-header">
<h3>Your Cart</h3>
<div class="close-cart" onclick="toggleCart()">✕</div>
</div>

<div id="cartItems"></div>

<br>

<button onclick="openReview()">Place Order</button>

</div>

<div class="modal" id="reviewModal">

<div class="modal-content">

<h3>Order Details</h3>

<div id="reviewList"></div>

<br>

<input id="shopName" placeholder="Shop Name"><br><br>
<input id="phoneNumber" placeholder="Phone Number"><br><br>

<button onclick="confirmOrder()">Confirm</button>
<button onclick="closeReview()">Cancel</button>

</div>

</div>

<script>

const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSHk_KwG4YCKte3jjsuGsXf_vPG_RsPQRexmJl_fIs0_Pjasq7I7g6nlxXskgncP6Xg6ca9__obX-5d/pub?gid=0&single=true&output=csv"

const ORDER_API="https://script.google.com/macros/s/AKfycby3QoqXU5UI_ofm_NX6F7wH4X84hAwArPFMZ4BOkn1KmRs0JpLFRJO91f63YSmupgejOg/exec"

let rows=[]
let cart={}
let currentPage=1
let itemsPerPage=12

fetch(SHEET_URL)
.then(r=>r.text())
.then(data=>{
rows=data.split("\n").slice(1).map(r=>r.split(","))
initCompanyFilter()
render()
})

function initCompanyFilter(){

let companies=[...new Set(rows.map(r=>r[0].trim()))]

let select=document.getElementById("companyFilter")

companies.forEach(c=>{
let opt=document.createElement("option")
opt.value=c
opt.textContent=c
select.appendChild(opt)
})

}

document.getElementById("search").onkeyup=()=>{currentPage=1;render()}
document.getElementById("companyFilter").onchange=()=>{currentPage=1;render()}

function render(){

let search=document.getElementById("search").value.toLowerCase()
let company=document.getElementById("companyFilter").value

let filtered=rows.filter(r=>{
return r[1].toLowerCase().includes(search)
&&(!company||r[0].trim()==company)
})

let start=(currentPage-1)*itemsPerPage
let pageItems=filtered.slice(start,start+itemsPerPage)

let html=""

pageItems.forEach(r=>{

let item=r[1]
let rate=parseFloat(r[6])

html+=`

<div class="card">

<div class="medicine">${item}</div>

<div class="company">${r[0]}</div>

<div class="details">MRP: ₹${r[3]}</div>
<div class="details">Batch: ${r[2]}</div>
<div class="details">Expiry: ${r[4]}</div>
<div class="details">Stock: ${r[5]}</div>

<div class="qty">
<button onclick="add('${item}',${rate},-1)">−</button>
<span id="qty-${item}">${cart[item]?.qty||0}</span>
<button onclick="add('${item}',${rate},1)">+</button>
</div>

</div>

`

})

document.getElementById("grid").innerHTML=html

renderPagination(filtered.length)

}

function renderPagination(total){

let pages=Math.ceil(total/itemsPerPage)

let html=""

if(pages<=4){

for(let i=1;i<=pages;i++){

html+=`<button class="${i==currentPage?'active-page':''}" onclick="goPage(${i})">${i}</button>`

}

}else{

if(currentPage>1){

html+=`<button onclick="goPage(${currentPage-1})">⬅</button>`

}

html+=` Page ${currentPage} of ${pages} `

if(currentPage<pages){

html+=`<button onclick="goPage(${currentPage+1})">➡</button>`

}

}

document.getElementById("pagination").innerHTML=html

}

function goPage(p){

currentPage=p

render()

}

function add(item,rate,change){

if(!cart[item]) cart[item]={qty:0,rate:rate}

cart[item].qty=Math.max(cart[item].qty+change,0)

updateCart()

let el=document.getElementById("qty-"+item)

if(el) el.innerText=cart[item].qty

}

function updateCart(){

let html=""
let count=0

for(let item in cart){

let q=cart[item].qty

if(q>0){

count+=q

html+=item+" x "+q+"<br>"

}

}

document.getElementById("cartItems").innerHTML=html
document.getElementById("cartCount").innerText=count

}

function toggleCart(){

document.getElementById("cartDrawer").classList.toggle("open")
document.getElementById("cartOverlay").classList.toggle("active")

}

function openReview(){

toggleCart()

let html=""

for(let item in cart){
if(cart[item].qty>0){
html+=item+" x "+cart[item].qty+"<br>"
}
}

document.getElementById("reviewList").innerHTML=html

document.getElementById("reviewModal").style.display="flex"

}

function closeReview(){

document.getElementById("reviewModal").style.display="none"

}

function confirmOrder(){

let shop=document.getElementById("shopName").value
let phone=document.getElementById("phoneNumber").value

if(!shop || !phone){

alert("Enter shop name and phone number")

return

}

let items=[]

for(let item in cart){

if(cart[item].qty>0){

items.push({
name:item,
rate:cart[item].rate,
qty:cart[item].qty,
total:cart[item].rate*cart[item].qty
})

}

}

fetch(ORDER_API,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
shop:shop,
mobile:phone,
items:items
})
})

alert("Order submitted successfully")

cart={}

updateCart()

closeReview()

}

</script>

</body>
</html>
