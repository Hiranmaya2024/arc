<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aaradhya Pharmaceuticals Ordering</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{font-family:Poppins;margin:0;background:#f4f6f9}

header{
background:#0b5ed7;color:white;padding:14px 20px;
display:flex;justify-content:space-between;align-items:center;
position:sticky;top:0
}

.version{
background:white;color:#0b5ed7;padding:4px 10px;border-radius:6px;font-size:13px
}

.cart-btn{
background:#25D366;border:none;color:white;padding:6px 10px;border-radius:6px
}

.container{padding:20px;max-width:1400px;margin:auto}

.filters{display:flex;gap:10px;margin-bottom:15px}

input,select{
padding:10px;border-radius:6px;border:1px solid #ccc
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:18px
}

.card{
background:white;padding:14px;border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
display:flex;flex-direction:column;gap:6px
}

.medicine{font-weight:600;font-size:14px}
.company{font-size:12px;color:#666}
.details{font-size:12px}

.qty{display:flex;justify-content:center;gap:6px;margin-top:6px}

.qty button{width:26px;height:26px}

.pagination{
display:flex;justify-content:center;gap:6px;margin-top:20px
}

.active-page{background:#25D366}

.cart-overlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.25);display:none;z-index:40
}

.cart-overlay.active{display:block}

.cart-drawer{
position:fixed;right:-400px;top:0;width:350px;height:100%;
background:white;box-shadow:-3px 0 12px rgba(0,0,0,0.25);
padding:20px;transition:0.3s;z-index:50;overflow:auto
}

.cart-drawer.open{right:0}

.cart table{width:100%;border-collapse:collapse}

.cart td,.cart th{padding:6px;border-bottom:1px solid #eee}

.order-btn{background:#25D366;width:100%;margin-top:10px}

.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);display:none;
justify-content:center;align-items:center
}

.modal-content{
background:white;padding:20px;border-radius:10px;width:350px
}

#loginScreen{
text-align:center;margin-top:120px
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginScreen">

<h2>Aaradhya Retailer Login</h2>

<input id="mobileInput" placeholder="Enter Mobile Number">

<br><br>

<button onclick="generateLoginLink()">Login via WhatsApp</button>

</div>

<!-- APP -->

<div id="app" style="display:none">

<header>

<div>Aaradhya Pharmaceuticals Ordering</div>

<div style="display:flex;gap:10px">

<div class="version">Version 9.7</div>

<button class="cart-btn" onclick="toggleCart()">
🛒 Cart (<span id="cartCount">0</span>) ₹<span id="cartTotal">0</span>
</button>

</div>

</header>

<div class="container">

<div class="filters">

<input id="search" placeholder="Search medicine">

<select id="companyFilter">
<option value="">All Companies</option>
</select>

</div>

<div class="grid" id="grid"></div>

<div class="pagination" id="pagination"></div>

</div>

</div>

<!-- CART -->

<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>

<div class="cart-drawer cart" id="cartDrawer">

<h3>Your Cart</h3>

<table>

<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>

<tbody id="cartItems"></tbody>

</table>

<div id="total">Total ₹0</div>

<button class="order-btn" onclick="openReview()">Place Order</button>

</div>

<!-- REVIEW -->

<div class="modal" id="reviewModal">

<div class="modal-content">

<h3>Review Order</h3>

<div id="reviewList"></div>

<br>

<button onclick="confirmOrder()">Confirm</button>
<button onclick="closeReview()">Cancel</button>

</div>

</div>

<script>

const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSHk_KwG4YCKte3jjsuGsXf_vPG_RsPQRexmJl_fIs0_Pjasq7I7g6nlxXskgncP6Xg6ca9__obX-5d/pub?gid=0&single=true&output=csv"

const ORDER_API="https://script.google.com/macros/s/AKfycby3QoqXU5UI_ofm_NX6F7wH4X84hAwArPFMZ4BOkn1KmRs0JpLFRJO91f63YSmupgejOg/exec"

let rows=[]
let cart={}
let currentPage=1
let itemsPerPage=12

function cleanItemName(name){
return name.replace(/^[0-9]+\s*[\.\-\)]?\s*/,'').trim()
}

/* LOGIN */

function generateLoginLink(){

let mobile=document.getElementById("mobileInput").value

if(!mobile){alert("Enter mobile");return}

let token=btoa(mobile)

let loginURL=window.location.origin+
window.location.pathname+
"?token="+token

let message="Login to Aaradhya Portal:\n"+loginURL

let waLink="https://wa.me/919533762508?text="+encodeURIComponent(message)

window.open(waLink,"_blank")

}

function checkMagicLogin(){

let params=new URLSearchParams(window.location.search)

let token=params.get("token")

if(!token) return

let mobile=atob(token)

localStorage.setItem("retailerMobile",mobile)

document.getElementById("loginScreen").style.display="none"
document.getElementById("app").style.display="block"

}

window.onload=function(){

checkMagicLogin()

let mobile=localStorage.getItem("retailerMobile")

if(mobile){

document.getElementById("loginScreen").style.display="none"
document.getElementById("app").style.display="block"

}

}

/* DATA LOAD */

fetch(SHEET_URL)
.then(r=>r.text())
.then(data=>{
rows=data.split("\n").slice(1).map(r=>r.split(","))
initCompanyFilter()
render()
})

function initCompanyFilter(){

let companies=[...new Set(rows.map(r=>r[0].trim()))].sort()

let select=document.getElementById("companyFilter")

companies.forEach(c=>{
let opt=document.createElement("option")
opt.value=c
opt.textContent=c
select.appendChild(opt)
})

}

/* RENDER */

function render(){

let search=document.getElementById("search").value?.toLowerCase()||""
let company=document.getElementById("companyFilter").value

let filtered=rows.filter(r=>{

let item=cleanItemName(r[1]).toLowerCase()

return item.includes(search) &&
(!company || r[0].trim().toLowerCase()==company.toLowerCase())

})

let start=(currentPage-1)*itemsPerPage
let pageItems=filtered.slice(start,start+itemsPerPage)

let html=""

pageItems.forEach(r=>{

let item=cleanItemName(r[1])
let rate=parseFloat(r[6])
let mrp=r[3]
let batch=r[2]
let expiry=r[4]

html+=`
<div class="card">

<div class="medicine">${item}</div>
<div class="company">${r[0]}</div>

<div class="details">MRP: ₹${mrp}</div>
<div class="details">Rate: ₹${rate}</div>
<div class="details">Batch: ${batch}</div>
<div class="details">Expiry: ${expiry}</div>

<div class="qty">
<button onclick="add('${item}',${rate},-1)">-</button>
<span>${cart[item]?.qty||0}</span>
<button onclick="add('${item}',${rate},1)">+</button>
</div>

</div>
`

})

document.getElementById("grid").innerHTML=html

renderPagination(filtered.length)

}

function renderPagination(total){

let pages=Math.ceil(total/itemsPerPage)

let start=Math.max(1,currentPage-2)
let end=Math.min(pages,start+4)

let html=""

if(currentPage>1)
html+=`<button onclick="goPage(${currentPage-1})">⬅</button>`

for(let i=start;i<=end;i++)
html+=`<button class="${i==currentPage?'active-page':''}" onclick="goPage(${i})">${i}</button>`

if(currentPage<pages)
html+=`<button onclick="goPage(${currentPage+1})">➡</button>`

document.getElementById("pagination").innerHTML=html

}

function goPage(p){currentPage=p;render()}

/* CART */

function add(item,rate,change){

if(!cart[item]) cart[item]={qty:0,rate:rate}

cart[item].qty=Math.max(cart[item].qty+change,0)

updateCart()

}

function updateCart(){

let html=""
let total=0
let count=0

for(let item in cart){

let q=cart[item].qty
let r=cart[item].rate

if(q>0){

let t=q*r
total+=t
count+=q

html+=`<tr><td>${item}</td><td>${q}</td><td>₹${t}</td></tr>`

}

}

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText="Total ₹"+total
document.getElementById("cartCount").innerText=count
document.getElementById("cartTotal").innerText=total

}

function toggleCart(){

document.getElementById("cartDrawer").classList.toggle("open")
document.getElementById("cartOverlay").classList.toggle("active")

}

/* ORDER */

function openReview(){

let html=""

for(let item in cart)
if(cart[item].qty>0)
html+=`${item} - ${cart[item].qty}<br>`

document.getElementById("reviewList").innerHTML=html
document.getElementById("reviewModal").style.display="flex"

}

function closeReview(){
document.getElementById("reviewModal").style.display="none"
}

function confirmOrder(){

let mobile=localStorage.getItem("retailerMobile")||"Unknown"

let items=[]

for(let item in cart)
if(cart[item].qty>0)
items.push(cart[item])

fetch(ORDER_API,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({shop:mobile,mobile:mobile,items:items})
})

alert("Order submitted successfully")

cart={}
updateCart()
closeReview()

}

/* FILTER EVENTS */

document.getElementById("companyFilter").addEventListener("change",function(){
currentPage=1
render()
})

document.getElementById("search").addEventListener("keyup",function(){
currentPage=1
render()
})

</script>

</body>
</html>
