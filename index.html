<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aaradhya Pharmaceuticals Ordering</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter,system-ui,Arial;
margin:0;
background:#f4f6f9
}

header{
background:#0b5ed7;
color:white;
padding:14px 20px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:10
}

.cart-btn{
background:#25D366;
border:none;
color:white;
padding:8px 12px;
border-radius:6px;
cursor:pointer
}

.container{
padding:20px;
max-width:1600px;
margin:auto
}

/* TOP ORDERED */

.top-panel{
background:white;
padding:14px;
border-radius:10px;
margin-bottom:18px;
box-shadow:0 3px 8px rgba(0,0,0,0.08)
}

.top-items{
display:flex;
flex-wrap:wrap;
gap:10px
}

.top-item{
background:#f1f3f5;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:13px
}

/* SEARCH */

.filters{
display:flex;
gap:10px;
margin-bottom:12px;
flex-wrap:wrap
}

input,select{
padding:12px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px
}

/* INVENTORY BUTTONS */

.inventory-filters{
display:flex;
gap:10px;
margin-bottom:16px;
flex-wrap:wrap
}

.inv-btn{
padding:8px 12px;
border:none;
background:#e9ecef;
border-radius:6px;
cursor:pointer;
font-size:13px
}

.inv-btn.active{
background:#0b5ed7;
color:white
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px
}

.card{
background:white;
padding:14px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
gap:6px
}

.medicine{font-weight:600;font-size:14px}
.company{font-size:12px;color:#666}

.details{font-size:12px}

/* STOCK COLORS */

.stock-good{color:#2ecc71;font-weight:600}
.stock-mid{color:#f39c12;font-weight:600}
.stock-low{color:#e74c3c;font-weight:600}

.qty{
display:flex;
justify-content:center;
gap:6px;
margin-top:6px;
align-items:center
}

.qty button{
width:28px;
height:28px;
cursor:pointer
}

/* PAGINATION */

.pagination{
display:flex;
justify-content:center;
gap:6px;
margin-top:20px
}

/* CART */

.cart-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
display:none;
z-index:40
}

.cart-overlay.active{display:block}

.cart-drawer{
position:fixed;
right:-400px;
top:0;
width:360px;
max-width:90%;
height:100%;
background:white;
box-shadow:-3px 0 12px rgba(0,0,0,0.25);
padding:20px;
transition:0.3s;
z-index:50;
overflow:auto
}

.cart-drawer.open{right:0}

.cart-header{
display:flex;
justify-content:space-between;
align-items:center
}

.close-cart{
cursor:pointer;
font-size:18px
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:350px;
max-width:90%
}

</style>
</head>

<body>

<header>

<div>Aaradhya Pharmaceuticals</div>

<button class="cart-btn" onclick="toggleCart()">
🛒 Cart (<span id="cartCount">0</span>)
</button>

</header>

<div class="container">

<!-- TOP ORDERED PANEL -->

<div class="top-panel">

<h4>🔥 Top Ordered Medicines</h4>

<div class="top-items" id="topItems"></div>

</div>

<div class="filters">

<input id="search" placeholder="Search medicine">

<select id="companyFilter">
<option value="">All Companies</option>
</select>

</div>

<div class="inventory-filters">

<button onclick="setView('all')" class="inv-btn active" id="btn-all">All</button>
<button onclick="setView('low')" class="inv-btn" id="btn-low">Low Stock</button>
<button onclick="setView('expiry')" class="inv-btn" id="btn-expiry">Expiry Risk</button>

</div>

<div class="grid" id="grid"></div>

<div class="pagination" id="pagination"></div>

</div>

<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>

<div class="cart-drawer" id="cartDrawer">

<div class="cart-header">
<h3>Your Cart</h3>
<div class="close-cart" onclick="toggleCart()">✕</div>
</div>

<div id="cartItems"></div>

<br>

<button onclick="openReview()">Place Order</button>

</div>

<div class="modal" id="reviewModal">

<div class="modal-content">

<h3>Order Details</h3>

<div id="reviewList"></div>

<br>

<input id="shopName" placeholder="Shop Name"><br><br>
<input id="phoneNumber" placeholder="Phone Number"><br><br>

<button onclick="confirmOrder()">Confirm</button>
<button onclick="closeReview()">Cancel</button>

</div>

</div>

<script>

const SHEET_URL="YOUR_CSV_LINK"
const ORDER_API="YOUR_APPSCRIPT_URL"

let rows=[]
let cart={}
let currentPage=1
let itemsPerPage=12
let currentView="all"

fetch(SHEET_URL)
.then(r=>r.text())
.then(data=>{
rows=data.split("\n").slice(1).map(r=>r.split(","))
initCompanies()
initTopItems()
render()
})

function initCompanies(){

let companies=[...new Set(rows.map(r=>r[0].trim()))]

let select=document.getElementById("companyFilter")

companies.forEach(c=>{
let o=document.createElement("option")
o.value=c
o.textContent=c
select.appendChild(o)
})

}

function initTopItems(){

let html=""

rows.slice(0,10).forEach(r=>{

let name=r[1]

html+=`<div class="top-item" onclick="quickAdd('${name}',${r[6]})">${name}</div>`

})

document.getElementById("topItems").innerHTML=html

}

function quickAdd(name,rate){

add(name,parseFloat(rate),1)

}

function setView(v){

currentView=v

document.querySelectorAll(".inv-btn").forEach(b=>b.classList.remove("active"))

document.getElementById("btn-"+v).classList.add("active")

render()

}

function render(){

let html=""

rows.forEach(r=>{

let item=r[1]
let stock=parseInt(r[5])
let rate=parseFloat(r[6])

let stockClass="stock-good"

if(stock<10) stockClass="stock-low"
else if(stock<25) stockClass="stock-mid"

html+=`

<div class="card">

<div class="medicine">${item}</div>

<div class="company">${r[0]}</div>

<div class="details">MRP ₹${r[3]}</div>
<div class="details">Batch ${r[2]}</div>
<div class="details">Expiry ${r[4]}</div>

<div class="${stockClass}">Stock ${stock}</div>

<div class="qty">
<button onclick="add('${item}',${rate},-1)">−</button>
<span id="qty-${item}">${cart[item]?.qty||0}</span>
<button onclick="add('${item}',${rate},1)">+</button>
</div>

</div>

`

})

document.getElementById("grid").innerHTML=html

}

function add(item,rate,change){

if(!cart[item]) cart[item]={qty:0,rate:rate}

cart[item].qty=Math.max(cart[item].qty+change,0)

updateCart()

let el=document.getElementById("qty-"+item)

if(el) el.innerText=cart[item].qty

}

function updateCart(){

let html=""
let count=0

for(let i in cart){

let q=cart[i].qty

if(q>0){

count+=q

html+=i+" x "+q+"<br>"

}

}

document.getElementById("cartItems").innerHTML=html
document.getElementById("cartCount").innerText=count

}

function toggleCart(){

document.getElementById("cartDrawer").classList.toggle("open")
document.getElementById("cartOverlay").classList.toggle("active")

}

function openReview(){

toggleCart()

let html=""

for(let i in cart){

if(cart[i].qty>0){

html+=i+" x "+cart[i].qty+"<br>"

}

}

document.getElementById("reviewList").innerHTML=html

document.getElementById("reviewModal").style.display="flex"

}

function closeReview(){

document.getElementById("reviewModal").style.display="none"

}

function confirmOrder(){

let shop=document.getElementById("shopName").value
let phone=document.getElementById("phoneNumber").value

let items=[]

for(let i in cart){

if(cart[i].qty>0){

items.push({
name:i,
qty:cart[i].qty,
rate:cart[i].rate
})

}

}

fetch(ORDER_API,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
shop:shop,
mobile:phone,
items:items
})
})

alert("Order placed")

cart={}
updateCart()
closeReview()

}

</script>

</body>
</html>
