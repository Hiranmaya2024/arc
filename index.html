<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aaradhya Pharma Stock</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#f4f6f9;
}

header{
background:#0b5ed7;
color:white;
padding:18px;
text-align:center;
font-size:20px;
font-weight:600;
}

.container{
padding:20px;
max-width:1400px;
margin:auto;
}

.search{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:20px;
}

.table-box{
background:white;
border-radius:10px;
overflow:auto;
box-shadow:0 3px 12px rgba(0,0,0,0.08);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
font-size:14px;
text-align:left;
}

th{
background:#f1f3f6;
font-weight:600;
}

.loading{
text-align:center;
padding:40px;
font-size:18px;
}

</style>

</head>

<body>

<header>
Aaradhya Pharmaceuticals Stock Dashboard
</header>

<div class="container">

<input type="text" id="search" class="search" placeholder="Search medicine or company">

<div class="table-box">

<div id="loading" class="loading">
Loading Stock Data...
</div>

<table id="table" style="display:none;">

<thead>
<tr>
<th>Company</th>
<th>Item Name</th>
<th>Batch</th>
<th>MRP</th>
<th>Expiry</th>
<th>Stock</th>
<th>Rate</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

<script>

const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vSHk_KwG4YCKte3jjsuGsXf_vPG_RsPQRexmJl_fIs0_Pjasq7I7g6nlxXskgncP6Xg6ca9__obX-5d/pub?gid=0&single=true&output=csv";

let rows=[];

fetch(url)
.then(res=>res.text())
.then(data=>{

rows=data.split("\n").slice(1).map(r=>r.split(","));

render(rows);

document.getElementById("loading").style.display="none";
document.getElementById("table").style.display="table";

});

function render(data){

let html="";

data.forEach(r=>{

if(r.length<7) return;

html+=`
<tr>
<td>${r[0]}</td>
<td>${r[1]}</td>
<td>${r[2]}</td>
<td>${r[3]}</td>
<td>${r[4]}</td>
<td>${r[5]}</td>
<td>${r[6]}</td>
</tr>
`;

});

document.getElementById("tbody").innerHTML=html;

}

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase();

let filtered=rows.filter(r=>r.join(" ").toLowerCase().includes(value));

render(filtered);

});

</script>

</body>
</html>
