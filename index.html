<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aaradhya Pharmaceuticals — Partner Rewards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0F2744;
  --navy-mid: #1A3A5C;
  --navy-soft: #E8EFF8;
  --canvas: #F7F8FA;
  --white: #FFFFFF;
  --amber: #F59E0B;
  --amber-light: #FEF3C7;
  --slate: #64748B;
  --slate-light: #CBD5E1;
  --ink: #1E293B;
  --muted: #94A3B8;
  --border: #E8EEF4;
  --radius: 14px;
  --radius-sm: 8px;
  --tier-bronze: #B45309;
  --tier-silver: #64748B;
  --tier-gold: #B45309;
  --tier-platinum: #5B21B6;
  --tier-diamond: #1D4ED8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--canvas);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── LAYOUT ── */
.shell { display: flex; flex-direction: column; min-height: 100vh; }
.topbar {
  background: var(--navy);
  padding: 0 28px;
  height: 58px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo-mark {
  width: 32px; height: 32px;
  background: var(--amber);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: var(--navy);
  flex-shrink: 0;
}
.topbar-title {
  font-size: 14px; font-weight: 600; color: #fff; flex: 1;
  letter-spacing: -0.01em;
}
.topbar-sub { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 1px; }
.topbar-actions { display: flex; gap: 8px; align-items: center; }

.main { flex: 1; padding: 28px; max-width: 1000px; margin: 0 auto; width: 100%; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; font-size: 13px; font-weight: 500;
  border-radius: var(--radius-sm); border: 1.5px solid transparent;
  cursor: pointer; transition: all 0.15s; font-family: inherit;
  white-space: nowrap;
}
.btn-ghost {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.85);
  border-color: rgba(255,255,255,0.12);
}
.btn-ghost:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.2); }
.btn-amber {
  background: var(--amber); color: var(--navy);
  border-color: var(--amber); font-weight: 600;
}
.btn-amber:hover { background: #E08D00; border-color: #E08D00; }
.btn-outline {
  background: var(--white); color: var(--ink);
  border-color: var(--border);
}
.btn-outline:hover { border-color: var(--slate-light); background: var(--canvas); }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* ── NAV TABS ── */
.tab-row {
  display: flex; gap: 2px;
  background: rgba(255,255,255,0.07);
  border-radius: 10px; padding: 3px;
}
.tab-btn {
  padding: 6px 16px; font-size: 13px; font-weight: 500;
  border-radius: 8px; border: none; cursor: pointer;
  color: rgba(255,255,255,0.5); background: transparent;
  transition: all 0.15s; font-family: inherit;
}
.tab-btn.active { background: rgba(255,255,255,0.15); color: #fff; }

/* ── PAGES ── */
.page { display: none; }
.page.visible { display: block; }

/* ── FILTER PILLS ── */
.filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; align-items: center; }
.filter-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-right: 4px; }
.pill {
  padding: 5px 14px; font-size: 12px; font-weight: 500;
  border-radius: 20px; border: 1.5px solid var(--border);
  background: var(--white); color: var(--slate); cursor: pointer;
  transition: all 0.15s;
}
.pill:hover { border-color: var(--slate-light); color: var(--ink); }
.pill.active { background: var(--navy); color: #fff; border-color: var(--navy); }

/* ── METRIC CARDS ── */
.metrics-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
.metric-card {
  background: var(--white); border-radius: var(--radius);
  padding: 20px 22px; border: 1px solid var(--border);
}
.metric-card.accent { background: var(--navy); border-color: var(--navy); }
.metric-lbl { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.metric-card.accent .metric-lbl { color: rgba(255,255,255,0.5); }
.metric-val { font-size: 32px; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; line-height: 1; }
.metric-card.accent .metric-val { color: var(--amber); }
.metric-sub { font-size: 11px; color: var(--muted); margin-top: 5px; }
.metric-card.accent .metric-sub { color: rgba(255,255,255,0.4); }

/* ── SECTION HEADER ── */
.section-hd {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 14px;
}
.section-hd h2 { font-size: 13px; font-weight: 600; color: var(--slate); text-transform: uppercase; letter-spacing: 0.06em; }

/* ── TIER CARDS ── */
.tier-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 24px; }
.tier-card {
  background: var(--white); border-radius: var(--radius-sm);
  padding: 16px 12px; text-align: center;
  border: 1px solid var(--border);
  border-top-width: 3px;
  transition: transform 0.15s;
}
.tier-card:hover { transform: translateY(-2px); }
.tier-emoji { font-size: 20px; margin-bottom: 6px; }
.tier-nm { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.tier-ct { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
.tier-mn { font-size: 10px; color: var(--muted); margin-top: 5px; }

/* ── TOP LIST ── */
.top-list { display: flex; flex-direction: column; gap: 0; }
.top-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px; border-radius: 10px;
  cursor: pointer; transition: background 0.12s; border-bottom: 1px solid var(--border);
}
.top-item:last-child { border-bottom: none; }
.top-item:hover { background: var(--canvas); }
.rank-num {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.top-info { flex: 1; min-width: 0; }
.top-nm { font-size: 14px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.top-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.top-right { text-align: right; flex-shrink: 0; }
.top-amt { font-size: 15px; font-weight: 700; color: var(--navy); }
.top-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 12px; margin-top: 4px; display: inline-block; }
.chev { color: var(--slate-light); font-size: 18px; flex-shrink: 0; margin-left: 4px; }

/* ── PARTNERS LIST ── */
.search-wrap { position: relative; margin-bottom: 16px; }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }
.search-box {
  width: 100%; padding: 11px 14px 11px 42px;
  border: 1.5px solid var(--border); border-radius: 10px;
  background: var(--white); color: var(--ink);
  font-size: 14px; font-family: inherit; outline: none;
  transition: border-color 0.15s;
}
.search-box:focus { border-color: var(--navy); }
.biz-list { display: flex; flex-direction: column; gap: 0; background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
.biz-item {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 18px; cursor: pointer;
  transition: background 0.12s;
  border-bottom: 1px solid var(--border);
  border-left: 3px solid transparent;
}
.biz-item:last-child { border-bottom: none; }
.biz-item:hover { background: var(--canvas); border-left-color: var(--amber); }
.biz-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.biz-info { flex: 1; min-width: 0; }
.biz-nm { font-size: 14px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.biz-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.biz-right { text-align: right; flex-shrink: 0; }
.biz-amt { font-size: 13px; font-weight: 700; color: var(--navy); }
.biz-tier-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; margin-top: 4px; display: inline-block; }

/* ── DETAIL PAGE ── */
.detail-hero {
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
  border-left-width: 5px;
  background: var(--white);
}
.detail-hdr { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 20px; }
.detail-avatar {
  width: 54px; height: 54px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 19px; font-weight: 700; flex-shrink: 0;
}
.detail-name { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 4px; }
.tier-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700; padding: 4px 12px;
  border-radius: 20px; text-transform: uppercase; letter-spacing: 0.05em;
}
.detail-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
.det-field {
  background: var(--canvas); border-radius: var(--radius-sm);
  padding: 11px 14px;
}
.det-lbl { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.det-val { font-size: 13px; font-weight: 600; color: var(--ink); word-break: break-word; }
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.stat-box {
  background: var(--canvas); border-radius: var(--radius-sm);
  padding: 14px 12px; text-align: center;
}
.stat-n { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.stat-l { font-size: 10px; font-weight: 600; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em; }

/* ── ORDER HISTORY ── */
.orders-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
.orders-card-hd { padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 600; color: var(--slate); text-transform: uppercase; letter-spacing: 0.06em; }
.orders-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.orders-tbl th { padding: 10px 18px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; background: var(--canvas); border-bottom: 1px solid var(--border); }
.orders-tbl td { padding: 11px 18px; border-bottom: 1px solid var(--border); color: var(--ink); }
.orders-tbl tr:last-child td { border-bottom: none; }
.orders-tbl tr:hover td { background: var(--canvas); }
.order-id { font-family: 'Menlo', monospace; font-size: 11px; color: var(--muted); }
.month-tag { font-size: 11px; background: var(--navy-soft); color: var(--navy); padding: 2px 9px; border-radius: 6px; font-weight: 600; }
.amount-cell { font-weight: 700; color: var(--navy); text-align: right; }

/* ── LOADING / ERROR ── */
.loading-wrap { text-align: center; padding: 60px 24px; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-txt { font-size: 14px; font-weight: 500; color: var(--slate); }
.loading-hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
.error-banner { background: #FEF2F2; border: 1px solid #FECACA; border-radius: var(--radius-sm); padding: 14px 18px; font-size: 13px; color: #991B1B; margin-bottom: 20px; }

/* ── EMPTY ── */
.empty-state { text-align: center; padding: 40px 24px; color: var(--muted); font-size: 13px; }

/* ── TIER CHANGE INDICATORS ── */
.promo-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; font-weight: 700; padding: 2px 7px 2px 5px;
  border-radius: 10px; vertical-align: middle; margin-left: 5px;
  background: #DCFCE7; color: #15803D; border: 1px solid #BBF7D0;
  white-space: nowrap;
}
.demo-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; font-weight: 700; padding: 2px 7px 2px 5px;
  border-radius: 10px; vertical-align: middle; margin-left: 5px;
  background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA;
  white-space: nowrap;
}
.tier-change-row {
  display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap;
}
.prev-tier-lbl {
  font-size: 10px; color: var(--muted); font-weight: 500;
}
.tier-change-card {
  background: var(--white); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 0 0 4px;
  margin-bottom: 16px;
}
.tier-change-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 10px;
}
.promo-count { font-size: 13px; font-weight: 600; color: #15803D; }
.demo-count  { font-size: 13px; font-weight: 600; color: #DC2626; }
.change-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 18px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.12s;
}
.change-item:last-child { border-bottom: none; }
.change-item:hover { background: var(--canvas); }
.change-arrow { font-size: 18px; flex-shrink: 0; }
.change-info { flex: 1; min-width: 0; }
.change-nm { font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.change-tiers { font-size: 11px; color: var(--muted); margin-top: 2px; }
.change-amt { font-size: 13px; font-weight: 700; text-align: right; flex-shrink: 0; }
.stat-change-box {
  position: relative;
}
.stat-change-badge {
  position: absolute; top: 8px; right: 8px;
  font-size: 9px; font-weight: 700; padding: 1px 5px;
  border-radius: 8px;
}

/* ── UTILITIES ── */
.fw7 { font-weight: 700; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.full-span { grid-column: 1 / -1; }

@media (max-width: 680px) {
  .main { padding: 16px; }
  .metrics-row { grid-template-columns: 1fr 1fr; }
  .metrics-row .metric-card:last-child { grid-column: 1 / -1; }
  .tier-row { grid-template-columns: repeat(3, 1fr); }
  .tier-row .tier-card:nth-child(4), .tier-row .tier-card:nth-child(5) { grid-column: span 1; }
  .detail-fields { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: 1fr 1fr; }
  .topbar-title .sub-part { display: none; }
}
</style>
</head>
<body>
<div class="shell">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="logo-mark">A</div>
    <div style="flex:1">
      <div class="topbar-title">Partner Rewards <span class="sub-part" style="opacity:0.4;font-weight:400">· Aaradhya Pharmaceuticals</span></div>
      <div class="topbar-sub" id="data-status">Connecting to Google Sheets…</div>
    </div>
    <div class="topbar-actions">
      <div id="nav-back-wrap" style="display:none">
        <button class="btn btn-ghost btn-sm" onclick="goBack()">← Back</button>
      </div>
      <div id="nav-home-wrap" style="display:none">
        <button class="btn btn-ghost btn-sm" onclick="goHome()">⌂ Dashboard</button>
      </div>
      <div class="tab-row" id="main-tabs">
        <button class="tab-btn active" onclick="switchTab('dashboard', this)">Dashboard</button>
        <button class="tab-btn" onclick="switchTab('details', this)">Partners</button>
      </div>
      <button class="btn btn-amber btn-sm" onclick="loadData()">↺ Refresh</button>
    </div>
  </header>

  <main class="main">

    <!-- LOADING -->
    <div id="loading-state" class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-txt">Fetching live data…</div>
      <div class="loading-hint">Reading from Google Sheets</div>
    </div>

    <!-- ERROR -->
    <div id="error-state" class="error-banner" style="display:none"></div>

    <!-- ══ DASHBOARD PAGE ══ -->
    <div id="page-dashboard" class="page">
      <div class="filter-row">
        <span class="filter-label">Period</span>
        <div id="month-filters" style="display:flex;flex-wrap:wrap;gap:6px"></div>
      </div>
      <div class="metrics-row" id="metrics-area"></div>
      <div style="background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:20px 22px;margin-bottom:16px">
        <div class="section-hd"><h2>Partners by tier</h2></div>
        <div class="tier-row" id="tier-row-area"></div>
      </div>
      <div style="background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:0 0 4px;margin-bottom:16px">
        <div style="padding:18px 20px 4px">
          <div class="section-hd"><h2>Top purchasers</h2></div>
        </div>
        <div class="top-list" id="top-list-area"></div>
      </div>
      <div id="tier-change-section"></div>
    </div>

    <!-- ══ PARTNERS LIST PAGE ══ -->
    <div id="page-details" class="page">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-box" id="search-input" type="text" placeholder="Search by business name or city…" oninput="filterBiz()">
      </div>
      <div class="biz-list" id="biz-list-area"></div>
    </div>

    <!-- ══ DETAIL PAGE ══ -->
    <div id="page-detail" class="page"></div>

  </main>
</div>

<script>
/* ─── DATA ─── */
const SHEET_ID = '17bW1LAfb4QxzGa7cNG_qsFjR6pdt5Q7D34IKBSRH-Lg';
const BASE_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&sheet=';

let customers = [], orders = [], allMonths = [];
let selectedMonth = 'All';
let navStack = ['dashboard'];

/* ─── TIER CONFIG ─── */
const TIERS = [
  { name:'Diamond Partner', emoji:'💎', min:100000, color:'#1D4ED8', bg:'#EFF6FF', text:'#1E40AF', borderTop:'#1D4ED8' },
  { name:'Platinum Partner',emoji:'🌟', min:70000,  color:'#7C3AED', bg:'#F5F3FF', text:'#5B21B6', borderTop:'#7C3AED' },
  { name:'Gold Partner',    emoji:'🥇', min:50000,  color:'#D97706', bg:'#FFFBEB', text:'#92400E', borderTop:'#D97706' },
  { name:'Silver Partner',  emoji:'🥈', min:20000,  color:'#64748B', bg:'#F8FAFC', text:'#475569', borderTop:'#94A3B8' },
  { name:'Bronze Partner',  emoji:'🥉', min:10000,  color:'#B45309', bg:'#FFF7ED', text:'#92400E', borderTop:'#CD7F32' },
];
const UNRANKED = { name:'Unranked', emoji:'◦',  min:0, color:'#CBD5E1', bg:'#F8FAFC', text:'#94A3B8', borderTop:'#CBD5E1' };
const ALL_TIERS = [...TIERS, UNRANKED];

function getTier(amt) {
  for (const t of TIERS) if (amt >= t.min) return t;
  return UNRANKED;
}
function tierRank(tier) {
  const idx = ALL_TIERS.findIndex(t => t.name === tier.name);
  return ALL_TIERS.length - 1 - idx; /* higher = better */
}

/* ─── FORMATTING ─── */
function fmtINR(n) { return '₹' + Math.round(n).toLocaleString('en-IN'); }

/* ─── MONTH SORTING ─── */
const MMAP = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
function monthVal(m) {
  const p = m.split('-');
  return parseInt(p[1]||0) * 12 + (MMAP[p[0]]||0);
}

/* ─── TIER CHANGE LOGIC ─── */
/* Returns { custId, name, curAmt, prevAmt, curTier, prevTier, change:'promoted'|'demoted'|'same' }
   for every customer that has data in both current & previous month */
function computeTierChanges(curMonth, prevMonth) {
  const curTotals  = custTotalsFrom(orders.filter(o => o.month === curMonth));
  const prevTotals = custTotalsFrom(orders.filter(o => o.month === prevMonth));
  const custNameMap = {};
  orders.forEach(o => { if (o.custId && o.bizName) custNameMap[o.custId] = o.bizName; });

  /* all customers that appeared in either month */
  const ids = new Set([...Object.keys(curTotals), ...Object.keys(prevTotals)]);
  const results = [];
  ids.forEach(id => {
    const curAmt  = curTotals[id]  || 0;
    const prevAmt = prevTotals[id] || 0;
    const curTier  = getTier(curAmt);
    const prevTier = getTier(prevAmt);
    const cr = tierRank(curTier), pr = tierRank(prevTier);
    if (cr === pr) return; /* no change */
    results.push({
      custId: id,
      name: custNameMap[id] || id,
      curAmt, prevAmt, curTier, prevTier,
      change: cr > pr ? 'promoted' : 'demoted'
    });
  });
  return results;
}

/* ─── CSV PARSER ─── */
function parseCSV(txt) {
  const rows = [];
  let cur = '', inQ = false, row = [];
  for (let i = 0; i < txt.length; i++) {
    const c = txt[i];
    if (c === '"') {
      if (inQ && txt[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      row.push(cur.trim()); cur = '';
    } else if ((c === '\n' || c === '\r') && !inQ) {
      if (c === '\r' && txt[i+1] === '\n') i++;
      row.push(cur.trim()); cur = '';
      if (row.some(x => x !== '')) rows.push(row);
      row = [];
    } else cur += c;
  }
  if (row.length) { row.push(cur.trim()); if (row.some(x=>x!=='')) rows.push(row); }
  return rows;
}

async function fetchSheet(name) {
  const r = await fetch(BASE_URL + encodeURIComponent(name));
  if (!r.ok) throw new Error('Cannot read sheet "' + name + '"');
  return parseCSV(await r.text());
}

/* ─── LOAD ─── */
async function loadData() {
  document.getElementById('loading-state').style.display = 'block';
  document.getElementById('error-state').style.display = 'none';
  ['dashboard','details','detail'].forEach(p => document.getElementById('page-'+p).classList.remove('visible'));

  try {
    const [cr, or] = await Promise.all([fetchSheet('1_CUSTOMERS'), fetchSheet('2_ORDERS')]);

    customers = [];
    for (let i = 1; i < cr.length; i++) {
      const r = cr[i];
      if (!r[0] || !r[1]) continue;
      customers.push({ id:r[0], name:r[1], owner:r[2]||'', mobile:r[3]||'', address:r[5]||'', city:r[6]||'', district:r[7]||'', license:r[9]||'' });
    }

    orders = [];
    for (let i = 1; i < or.length; i++) {
      const r = or[i];
      if (!r[0]) continue;
      const amt = parseFloat((r[6]||'').replace(/[₹,\s]/g,'')) || 0;
      orders.push({ id:r[0], custId:r[1]||'', bizName:r[2]||'', date:r[3]||'', month:r[4]||'', amount:amt });
    }

    allMonths = [...new Set(orders.map(o=>o.month).filter(Boolean))].sort((a,b) => monthVal(b) - monthVal(a));

    buildFilters();
    renderDash();
    buildBizList();

    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('data-status').textContent = `Live · ${customers.length} partners · ${orders.length} orders`;
    showPage('dashboard');
  } catch(e) {
    document.getElementById('loading-state').style.display = 'none';
    const el = document.getElementById('error-state');
    el.style.display = 'block';
    el.innerHTML = '<strong>Could not load data:</strong> ' + e.message + ' — Ensure the sheet is set to "Anyone with the link can view".';
  }
}

/* ─── FILTERS ─── */
function buildFilters() {
  const c = document.getElementById('month-filters');
  c.innerHTML = '';
  ['All', ...allMonths].forEach(m => {
    const b = document.createElement('button');
    b.className = 'pill' + (m === selectedMonth ? ' active' : '');
    b.textContent = m;
    b.onclick = () => { selectedMonth = m; buildFilters(); renderDash(); };
    c.appendChild(b);
  });
}

function filteredOrders() {
  return selectedMonth === 'All' ? orders : orders.filter(o => o.month === selectedMonth);
}

function custTotalsFrom(ords) {
  const t = {};
  ords.forEach(o => {
    if (!o.custId || o.custId.toLowerCase()==='unknown') return;
    t[o.custId] = (t[o.custId]||0) + o.amount;
  });
  return t;
}

/* ─── TIER CHANGE BADGE HTML ─── */
function changeBadge(change, curTier, prevTier) {
  if (change === 'promoted') {
    return `<span class="promo-badge">▲ Promoted to ${curTier.name.replace(' Partner','')}</span>`;
  } else if (change === 'demoted') {
    return `<span class="demo-badge">▼ Dropped to ${curTier.name.replace(' Partner','')}</span>`;
  }
  return '';
}

/* per-customer change indicator for inline use (just arrow + label) */
function inlineBadge(change, curTier) {
  if (change === 'promoted') return `<span class="promo-badge">▲ ${curTier.name.replace(' Partner','')}</span>`;
  if (change === 'demoted')  return `<span class="demo-badge">▼ ${curTier.name.replace(' Partner','')}</span>`;
  return '';
}

/* ─── PER-CUSTOMER CHANGE FOR CURRENT CONTEXT ─── */
/* Returns change object or null */
function getChangeForCustomer(custId, curMonth, prevMonth) {
  if (!curMonth || !prevMonth) return null;
  const curAmt  = custTotalsFrom(orders.filter(o=>o.month===curMonth))[custId]  || 0;
  const prevAmt = custTotalsFrom(orders.filter(o=>o.month===prevMonth))[custId] || 0;
  const curTier = getTier(curAmt), prevTier = getTier(prevAmt);
  const cr = tierRank(curTier), pr = tierRank(prevTier);
  if (cr === pr) return null;
  return { curAmt, prevAmt, curTier, prevTier, change: cr > pr ? 'promoted' : 'demoted' };
}

/* ─── DASHBOARD ─── */
function renderDash() {
  const ords = filteredOrders();
  const totals = custTotalsFrom(ords);
  const ids = Object.keys(totals);
  const revenue = ords.reduce((s,o)=>s+o.amount,0);

  /* ── Determine compare months ──
     If a specific month is selected: compare that month vs the one before it.
     If "All": compare the two most recent months. */
  const curMonth  = selectedMonth !== 'All' ? selectedMonth : (allMonths[0] || '');
  const prevMonth = selectedMonth !== 'All'
    ? allMonths[allMonths.indexOf(selectedMonth) + 1] || ''
    : (allMonths[1] || '');

  /* Build per-customer change map for current context */
  const curMonthTotals  = curMonth  ? custTotalsFrom(orders.filter(o=>o.month===curMonth))  : {};
  const prevMonthTotals = prevMonth ? custTotalsFrom(orders.filter(o=>o.month===prevMonth)) : {};
  const changeMap = {};
  const allIds = new Set([...Object.keys(curMonthTotals), ...Object.keys(prevMonthTotals)]);
  allIds.forEach(id => {
    const ca = curMonthTotals[id]||0, pa = prevMonthTotals[id]||0;
    const ct = getTier(ca), pt = getTier(pa);
    const cr = tierRank(ct), pr2 = tierRank(pt);
    if (cr !== pr2) changeMap[id] = { curTier:ct, prevTier:pt, change: cr > pr2 ? 'promoted':'demoted', curAmt:ca, prevAmt:pa };
  });

  /* metrics */
  document.getElementById('metrics-area').innerHTML = `
    <div class="metric-card accent">
      <div class="metric-lbl">Total Revenue</div>
      <div class="metric-val" style="font-size:24px">${fmtINR(revenue)}</div>
      <div class="metric-sub">${selectedMonth === 'All' ? 'All time' : selectedMonth}</div>
    </div>
    <div class="metric-card">
      <div class="metric-lbl">Active Partners</div>
      <div class="metric-val">${ids.length}</div>
      <div class="metric-sub">with orders placed</div>
    </div>
    <div class="metric-card">
      <div class="metric-lbl">Total Orders</div>
      <div class="metric-val">${ords.length}</div>
      <div class="metric-sub">transactions</div>
    </div>`;

  /* tiers */
  document.getElementById('tier-row-area').innerHTML = TIERS.map((t, i) => {
    const nextMin = i > 0 ? TIERS[i-1].min : Infinity;
    const cnt = ids.filter(id => totals[id] >= t.min && totals[id] < nextMin).length;
    return `<div class="tier-card" style="border-top-color:${t.borderTop}">
      <div class="tier-emoji">${t.emoji}</div>
      <div class="tier-nm" style="color:${t.color}">${t.name.replace(' Partner','')}</div>
      <div class="tier-ct" style="color:${t.text}">${cnt}</div>
      <div class="tier-mn">≥ ${fmtINR(t.min)}</div>
    </div>`;
  }).join('');

  /* top 5 with change badges */
  const sorted = ids.sort((a,b) => totals[b]-totals[a]).slice(0,5);
  const custNameMap = {};
  ords.forEach(o => { if(o.custId && o.bizName) custNameMap[o.custId] = o.bizName; });

  const medals = [
    {bg:'#FEF3C7',color:'#D97706',label:'#1'},
    {bg:'#F1F5F9',color:'#64748B',label:'#2'},
    {bg:'#FFF7ED',color:'#B45309',label:'#3'},
    {bg:'#F3F4F6',color:'#9CA3AF',label:'#4'},
    {bg:'#F3F4F6',color:'#9CA3AF',label:'#5'},
  ];

  document.getElementById('top-list-area').innerHTML = sorted.length === 0
    ? '<div class="empty-state">No orders in selected period</div>'
    : sorted.map((id,i) => {
      const m = medals[i];
      const tier = getTier(totals[id]);
      const nm = custNameMap[id] || id;
      const chg = changeMap[id];
      const badge = chg ? inlineBadge(chg.change, chg.curTier) : '';
      return `<div class="top-item" onclick="showDetailById('${id}')">
        <div class="rank-num" style="background:${m.bg};color:${m.color}">${m.label}</div>
        <div class="top-info">
          <div class="top-nm">${nm}</div>
          <div class="top-sub">${tier.emoji} ${tier.name}</div>
        </div>
        <div class="top-right">
          <div class="top-amt">${fmtINR(totals[id])} ${badge}</div>
          <div class="top-badge" style="background:${tier.bg};color:${tier.color}">${tier.name}</div>
        </div>
        <span class="chev">›</span>
      </div>`;
    }).join('');

  /* ── Tier Change Summary section ── */
  renderTierChangeSection(changeMap, curMonth, prevMonth, custNameMap, curMonthTotals);
}

function renderTierChangeSection(changeMap, curMonth, prevMonth, custNameMap, curMonthTotals) {
  const sec = document.getElementById('tier-change-section');
  if (!curMonth || !prevMonth) { sec.innerHTML = ''; return; }

  const promoted = Object.entries(changeMap).filter(([,v])=>v.change==='promoted');
  const demoted  = Object.entries(changeMap).filter(([,v])=>v.change==='demoted');

  if (!promoted.length && !demoted.length) {
    sec.innerHTML = `<div style="background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:18px 22px;text-align:center;color:var(--muted);font-size:13px">
      No tier changes between <strong>${prevMonth}</strong> and <strong>${curMonth}</strong>
    </div>`;
    return;
  }

  const makeRows = (list, type) => list
    .sort((a,b) => (b[1].curAmt||0)-(a[1].curAmt||0))
    .map(([id,v]) => {
      const nm = custNameMap[id] || id;
      const arrow = type==='promoted'
        ? `<span style="font-size:20px;color:#16A34A">▲</span>`
        : `<span style="font-size:20px;color:#DC2626">▼</span>`;
      const badge = type==='promoted'
        ? `<span class="promo-badge">▲ Promoted</span>`
        : `<span class="demo-badge">▼ Demoted</span>`;
      return `<div class="change-item" onclick="showDetailById('${id}')">
        <div class="change-arrow">${arrow}</div>
        <div class="change-info">
          <div class="change-nm">${nm}</div>
          <div class="change-tiers">
            <span style="color:var(--muted)">${v.prevTier.emoji} ${v.prevTier.name}</span>
            <span style="margin:0 6px;color:var(--muted)">→</span>
            <span style="color:${v.curTier.color};font-weight:600">${v.curTier.emoji} ${v.curTier.name}</span>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="change-amt" style="color:${type==='promoted'?'#16A34A':'#DC2626'}">${fmtINR(v.curAmt)}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">prev: ${fmtINR(v.prevAmt)}</div>
        </div>
        <span class="chev">›</span>
      </div>`;
    }).join('');

  sec.innerHTML = `
    <div style="background:var(--white);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:0">
      <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--slate);text-transform:uppercase;letter-spacing:0.06em">Tier Changes</div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px">${prevMonth} → ${curMonth}</div>
        </div>
        <div style="display:flex;gap:12px">
          ${promoted.length ? `<span class="promo-badge">▲ ${promoted.length} Promoted</span>` : ''}
          ${demoted.length  ? `<span class="demo-badge">▼ ${demoted.length} Demoted</span>` : ''}
        </div>
      </div>
      ${promoted.length ? `
        <div style="padding:10px 18px 4px;font-size:11px;font-weight:700;color:#15803D;text-transform:uppercase;letter-spacing:0.05em;background:#F0FDF4">
          ▲ Promotions (${promoted.length})
        </div>
        ${makeRows(promoted,'promoted')}` : ''}
      ${demoted.length ? `
        <div style="padding:10px 18px 4px;font-size:11px;font-weight:700;color:#DC2626;text-transform:uppercase;letter-spacing:0.05em;background:#FEF2F2;${promoted.length?'border-top:1px solid var(--border)':''}">
          ▼ Demotions (${demoted.length})
        </div>
        ${makeRows(demoted,'demoted')}` : ''}
    </div>`;
}

/* ─── BIZ LIST ─── */
function buildBizList() {
  const allTotals = custTotalsFrom(orders);
  window._allTotals = allTotals;

  /* build per-customer change map using two most recent months */
  const curMo  = allMonths[0] || '';
  const prevMo = allMonths[1] || '';
  const curT  = curMo  ? custTotalsFrom(orders.filter(o=>o.month===curMo))  : {};
  const prevT = prevMo ? custTotalsFrom(orders.filter(o=>o.month===prevMo)) : {};
  const bizChangeMap = {};
  const allIds = new Set([...Object.keys(curT),...Object.keys(prevT)]);
  allIds.forEach(id => {
    const ca=curT[id]||0, pa=prevT[id]||0;
    const ct=getTier(ca), pt=getTier(pa);
    if (tierRank(ct) !== tierRank(pt))
      bizChangeMap[id] = { curTier:ct, prevTier:pt, change: tierRank(ct)>tierRank(pt)?'promoted':'demoted', curAmt:ca, prevAmt:pa };
  });
  window._bizChangeMap = bizChangeMap;

  const sorted = [...customers].sort((a,b)=>(allTotals[b.id]||0)-(allTotals[a.id]||0));
  window._sortedCust = sorted;
  renderBizCards(sorted);
}

function initials(name) { return name.split(/\s+/).map(w=>w[0]||'').join('').slice(0,2).toUpperCase() || '?'; }

function renderBizCards(list) {
  const t = window._allTotals || {};
  const chgMap = window._bizChangeMap || {};
  if (!list.length) { document.getElementById('biz-list-area').innerHTML = '<div class="empty-state">No partners found</div>'; return; }
  document.getElementById('biz-list-area').innerHTML = list.slice(0,200).map(c => {
    const amt = t[c.id]||0;
    const tier = getTier(amt);
    const ini = initials(c.name);
    const chg = chgMap[c.id];
    const badge = chg ? inlineBadge(chg.change, chg.curTier) : '';
    return `<div class="biz-item" style="border-left-color:transparent"
      onmouseenter="this.style.borderLeftColor='${tier.color}'"
      onmouseleave="this.style.borderLeftColor='transparent'"
      onclick="showDetailById('${c.id}')">
      <div class="biz-avatar" style="background:${tier.bg};color:${tier.color}">${ini}</div>
      <div class="biz-info">
        <div class="biz-nm">${c.name}</div>
        <div class="biz-meta">${[c.city,c.district].filter(Boolean).join(' · ') || 'Location not set'}</div>
      </div>
      <div class="biz-right">
        ${amt > 0 ? `<div class="biz-amt">${fmtINR(amt)} ${badge}</div>` : '<div style="font-size:12px;color:var(--muted)">No orders</div>'}
        <div class="biz-tier-tag" style="background:${tier.bg};color:${tier.color}">${tier.emoji} ${tier.name}</div>
      </div>
      <span style="color:var(--slate-light);font-size:18px;margin-left:4px">›</span>
    </div>`;
  }).join('');
}

function filterBiz() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const res = (window._sortedCust||[]).filter(c =>
    c.name.toLowerCase().includes(q) ||
    c.city.toLowerCase().includes(q) ||
    c.district.toLowerCase().includes(q)
  );
  renderBizCards(res);
}

/* ─── DETAIL ─── */

            <td><span class="order-id">${o.id}</span></td>
            <td>${o.date}</td>
            <td><span class="month-tag">${o.month}</span></td>
            <td class="amount-cell">${fmtINR(o.amount)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
      ${allCount>25?`<div style="text-align:center;padding:12px;font-size:12px;color:var(--muted)">Showing 25 of ${allCount} orders</div>`:''}
    </div>` : '<div class="empty-state" style="background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:32px">No orders found for this partner</div>'}
  `;
  showPage('detail');
}

/* ─── NAVIGATION ─── */
function showPage(page) {
  ['dashboard','details','detail'].forEach(p => document.getElementById('page-'+p).classList.remove('visible'));
  document.getElementById('page-'+page).classList.add('visible');
  const isDetail = page === 'detail';
  document.getElementById('main-tabs').style.display = isDetail ? 'none' : 'flex';
  document.getElementById('nav-back-wrap').style.display = isDetail ? 'block' : 'none';
  document.getElementById('nav-home-wrap').style.display = isDetail ? 'block' : 'none';
  if (navStack[navStack.length-1] !== page) navStack.push(page);
  if (!isDetail) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active',(page==='dashboard'&&i===0)||(page==='details'&&i===1)));
  }
  window.scrollTo(0,0);
}

function switchTab(page, el) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  navStack = [page];
  showPage(page);
}

function goHome() { navStack=['dashboard']; showPage('dashboard'); }
function goBack() { navStack.pop(); showPage(navStack[navStack.length-1]||'dashboard'); }

loadData();
</script>
</body>
</html>
