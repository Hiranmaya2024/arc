<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aaradhya Digital Ordering Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#f4f6f9;
}

header{
background:#0b5ed7;
color:white;
padding:15px;
text-align:center;
font-weight:600;
}

.container{
max-width:1400px;
margin:auto;
padding:15px;
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

input,select{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.table-box{
background:white;
border-radius:10px;
overflow:auto;
box-shadow:0 3px 12px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
font-size:13px;
}

th{
background:#f1f3f6;
}

.qty{
display:flex;
gap:4px;
}

.qty button{
width:24px;
height:24px;
border:none;
background:#0b5ed7;
color:white;
border-radius:4px;
}

.pagination{
text-align:center;
margin:10px;
}

.pagination button{
margin:3px;
padding:5px 10px;
border:none;
background:#0b5ed7;
color:white;
border-radius:4px;
}

.cart{
background:white;
padding:15px;
border-radius:10px;
margin-top:15px;
box-shadow:0 3px 12px rgba(0,0,0,0.1);
}

.cart-table{
width:100%;
}

.total{
font-weight:600;
font-size:16px;
margin-top:10px;
}

.order-btn{
background:#25D366;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:8px;
margin-top:10px;
}

</style>
</head>

<body>

<header>Aaradhya Pharmaceuticals Ordering Portal</header>

<div class="container">

<div class="controls">

<input id="shopName" placeholder="Shop Name">

<input id="mobile" placeholder="Mobile Number">

<input id="search" placeholder="Search medicine">

<select id="companyFilter">
<option value="">All Companies</option>
</select>

</div>

<div class="table-box">

<table id="table">

<thead>
<tr>
<th>Item</th>
<th>Company</th>
<th>Batch</th>
<th>MRP</th>
<th>Stock</th>
<th>Rate</th>
<th>Qty</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

<div class="pagination" id="pagination"></div>

<div class="cart">

<h3>Order Cart</h3>

<table class="cart-table">

<thead>
<tr>
<th>Item</th>
<th>Rate</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>

<tbody id="cartItems"></tbody>

</table>

<div class="total" id="grandTotal">Total: ₹0</div>

<button class="order-btn" onclick="sendWhatsApp()">Send Order on WhatsApp</button>

</div>

</div>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSHk_KwG4YCKte3jjsuGsXf_vPG_RsPQRexmJl_fIs0_Pjasq7I7g6nlxXskgncP6Xg6ca9__obX-5d/pub?gid=0&single=true&output=csv";

let rows=[];
let filteredRows=[];
let cart={};

let currentPage=1;
const perPage=20;

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

rows=data.split("\n").slice(1).map(r=>r.split(","));
filteredRows=[...rows];

initCompanies();
renderPage();

});

function initCompanies(){

let companies=[...new Set(rows.map(r=>r[0]))];

let select=document.getElementById("companyFilter");

companies.forEach(c=>{
let o=document.createElement("option");
o.value=c;
o.textContent=c;
select.appendChild(o);
});

}

function renderPage(){

let start=(currentPage-1)*perPage;
let pageRows=filteredRows.slice(start,start+perPage);

let html="";

pageRows.forEach(r=>{

let index=rows.indexOf(r);

html+=`
<tr>

<td>${r[1]}</td>
<td>${r[0]}</td>
<td>${r[2]}</td>
<td>${r[3]}</td>
<td>${r[5]}</td>
<td>${r[6]}</td>

<td class="qty">

<button onclick="changeQty(${index},-1)">-</button>

<span id="qty${index}">${cart[r[1]]?.qty||0}</span>

<button onclick="changeQty(${index},1)">+</button>

</td>

</tr>
`;

});

document.getElementById("tbody").innerHTML=html;

renderPagination();

}

function renderPagination(){

let pages=Math.ceil(filteredRows.length/perPage);

let html="";

for(let i=1;i<=pages;i++){

html+=`<button onclick="goPage(${i})">${i}</button>`;

}

document.getElementById("pagination").innerHTML=html;

}

function goPage(p){

currentPage=p;
renderPage();

}

function changeQty(index,change){

let item=rows[index][1];
let rate=parseFloat(rows[index][6]);

if(!cart[item]) cart[item]={qty:0,rate:rate};

cart[item].qty+=change;

if(cart[item].qty<0) cart[item].qty=0;

document.getElementById("qty"+index).innerText=cart[item].qty;

updateCart();

}

function updateCart(){

let html="";
let total=0;

for(let item in cart){

let qty=cart[item].qty;
let rate=cart[item].rate;

if(qty>0){

let price=qty*rate;
total+=price;

html+=`
<tr>
<td>${item}</td>
<td>${rate}</td>
<td>${qty}</td>
<td>${price.toFixed(2)}</td>
</tr>
`;

}

}

document.getElementById("cartItems").innerHTML=html;

document.getElementById("grandTotal").innerText="Total: ₹"+total.toFixed(2);

}

function sendWhatsApp(){

let shop=document.getElementById("shopName").value;
let mobile=document.getElementById("mobile").value;

let msg="Order for Aaradhya Pharmaceuticals%0A";

msg+="Shop: "+shop+"%0A";
msg+="Mobile: "+mobile+"%0A%0A";

let total=0;

for(let item in cart){

let qty=cart[item].qty;
let rate=cart[item].rate;

if(qty>0){

let price=qty*rate;
total+=price;

msg+=item+" | "+rate+" x "+qty+" = "+price.toFixed(2)+"%0A";

}

}

msg+="%0ATotal: "+total.toFixed(2);

window.open("https://wa.me/?text="+msg);

}

function applyFilters(){

let text=document.getElementById("search").value.toLowerCase();
let company=document.getElementById("companyFilter").value;

filteredRows=rows.filter(r=>{

let matchSearch=r.join(" ").toLowerCase().includes(text);
let matchCompany=!company||r[0]==company;

return matchSearch && matchCompany;

});

currentPage=1;
renderPage();

}

document.getElementById("search").addEventListener("keyup",applyFilters);
document.getElementById("companyFilter").addEventListener("change",applyFilters);

</script>

</body>
</html>
