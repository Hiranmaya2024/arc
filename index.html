<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Aaradhya Pharmaceuticals Ordering Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Poppins;
margin:0;
background:#f4f6f9;
}

header{
background:#0b5ed7;
color:white;
padding:16px;
text-align:center;
font-size:20px;
font-weight:600;
}

.login{
max-width:380px;
margin:80px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#0b5ed7;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:6px;
cursor:pointer;
}

#app{
display:none;
}

.container{
display:grid;
grid-template-columns:1fr 320px;
gap:20px;
padding:20px;
max-width:1400px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:18px;
}

.card{
background:white;
padding:14px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
justify-content:space-between;
}

.qty{
display:flex;
justify-content:center;
gap:8px;
margin-top:8px;
}

.qty button{
width:26px;
height:26px;
}

.cart{
background:white;
padding:18px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.15);
}

.cart table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

.cart th{
border-bottom:1px solid #ddd;
padding:6px;
text-align:left;
}

.cart td{
padding:6px;
border-bottom:1px solid #eee;
}

.cart-total{
margin-top:10px;
font-weight:600;
font-size:16px;
}

.order-btn{
background:#25D366;
margin-top:10px;
}

.expired{
color:red;
font-weight:600;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<header>Aaradhya Pharmaceuticals Ordering Portal</header>

<div class="login" id="login">

<h3>Retailer Login</h3>

<input id="shop" placeholder="Shop Name">
<input id="mobile" placeholder="Mobile Number">

<button onclick="login()">Login</button>

</div>

<div id="app">

<div class="container">

<div>

<input id="search" placeholder="Search medicine">

<div class="grid" id="grid"></div>

</div>

<div class="cart">

<h3>Order Cart</h3>

<table>

<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>

<tbody id="cartItems"></tbody>

</table>

<div class="cart-total" id="total">Total ₹0</div>

<button class="order-btn" onclick="placeOrder()">Place Order</button>

<button onclick="generatePDF()">Download PDF</button>

</div>

</div>

</div>

<script>

const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSHk_KwG4YCKte3jjsuGsXf_vPG_RsPQRexmJl_fIs0_Pjasq7I7g6nlxXskgncP6Xg6ca9__obX-5d/pub?gid=0&single=true&output=csv";

const ORDER_API="https://script.google.com/macros/s/AKfycby3QoqXU5UI_ofm_NX6F7wH4X84hAwArPFMZ4BOkn1KmRs0JpLFRJO91f63YSmupgejOg/exec";

let rows=[];
let cart={};

fetch(SHEET_URL)
.then(r=>r.text())
.then(data=>{
rows=data.split("\n").slice(1).map(r=>r.split(","));
render();
});

function login(){

let shop=document.getElementById("shop").value;

if(shop=="") return alert("Enter shop name");

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

}

function render(){

let search=document.getElementById("search").value?.toLowerCase() || "";

let html="";

rows.forEach(r=>{

let item=r[1];

if(!item.toLowerCase().includes(search)) return;

let stock=parseInt(r[5]);
let rate=parseFloat(r[6]);
let exp=new Date(r[4]);

let expired=exp < new Date();

html+=`

<div class="card">

<b>${item}</b>

<div>${r[0]}</div>

<div>Rate ₹${rate}</div>

<div>Stock: ${stock}</div>

${expired ? "<div class='expired'>Expired</div>" : ""}

<div class="qty">

<button onclick="add('${item}',${rate},-1)">-</button>

<span>${cart[item]?.qty||0}</span>

<button onclick="add('${item}',${rate},1)">+</button>

</div>

</div>

`;

});

document.getElementById("grid").innerHTML=html;

}

function add(item,rate,change){

let product=rows.find(r=>r[1]==item);

let stock=parseInt(product[5]);
let exp=new Date(product[4]);

if(exp < new Date()) return alert("Expired medicine");

if(!cart[item]) cart[item]={qty:0,rate:rate};

let newQty=cart[item].qty+change;

if(newQty>stock) return alert("Stock limit reached");

cart[item].qty=Math.max(newQty,0);

updateCart();
render();

}

function updateCart(){

let html="";
let total=0;

for(let item in cart){

let q=cart[item].qty;
let r=cart[item].rate;

if(q>0){

let t=q*r;

total+=t;

html+=`
<tr>
<td>${item}</td>
<td>${q}</td>
<td>₹${t.toFixed(2)}</td>
</tr>
`;

}

}

document.getElementById("cartItems").innerHTML=html;

document.getElementById("total").innerText="Total ₹"+total.toFixed(2);

}

function placeOrder(){

let shop=document.getElementById("shop").value;
let mobile=document.getElementById("mobile").value;

let items=[];

for(let item in cart){

if(cart[item].qty>0){

items.push({
name:item,
rate:cart[item].rate,
qty:cart[item].qty,
total:cart[item].rate*cart[item].qty
});

}

}

if(items.length===0){
alert("Cart empty");
return;
}

fetch(ORDER_API,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
shop:shop,
mobile:mobile,
items:items
})
});

alert("Order submitted successfully");

cart={};

updateCart();
render();

}

function generatePDF(){

const {jsPDF}=window.jspdf;

let doc=new jsPDF();

doc.text("Aaradhya Pharmaceuticals Order",20,20);

let y=40;

for(let item in cart){

if(cart[item].qty>0){

doc.text(`${item}  ${cart[item].qty}`,20,y);

y+=10;

}

}

doc.save("order.pdf");

}

document.getElementById("search").addEventListener("keyup",render);

</script>

</body>
</html>
