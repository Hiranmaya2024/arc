<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aaradhya Pharma Ordering Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#f4f6f9;
}

header{
background:#0b5ed7;
color:white;
padding:15px;
font-size:20px;
font-weight:600;
text-align:center;
}

.container{
max-width:1400px;
margin:auto;
padding:15px;
display:grid;
grid-template-columns: 1fr 320px;
gap:20px;
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

input,select{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
}

.card{
background:white;
border-radius:10px;
padding:12px;
box-shadow:0 3px 12px rgba(0,0,0,0.1);
}

.card h4{
margin:0 0 5px 0;
font-size:15px;
}

.company{
font-size:12px;
color:#666;
}

.price{
margin-top:5px;
font-weight:600;
color:#0b5ed7;
}

.stock{
font-size:12px;
}

.low{color:red;}
.good{color:green;}

.expired{
color:red;
font-weight:600;
font-size:12px;
}

.qty{
display:flex;
justify-content:center;
gap:5px;
margin-top:8px;
}

.qty button{
width:26px;
height:26px;
border:none;
background:#0b5ed7;
color:white;
border-radius:4px;
cursor:pointer;
}

.pagination{
text-align:center;
margin-top:15px;
}

.pagination button{
margin:4px;
padding:6px 10px;
border:none;
background:#0b5ed7;
color:white;
border-radius:4px;
cursor:pointer;
}

.cart{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.2);
height:fit-content;
}

.cart table{
width:100%;
font-size:12px;
border-collapse:collapse;
}

.cart th,.cart td{
border-bottom:1px solid #eee;
padding:6px;
}

.order-btn{
background:#25D366;
color:white;
border:none;
width:100%;
padding:12px;
border-radius:8px;
margin-top:10px;
font-size:15px;
cursor:pointer;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header>Aaradhya Pharma Ordering Portal</header>

<div class="container">

<div>

<div class="controls">

<input id="shopName" placeholder="Shop Name">

<input id="mobile" placeholder="Mobile Number">

<input id="search" placeholder="Search medicine">

<select id="companyFilter">
<option value="">All Companies</option>
</select>

</div>

<div class="grid" id="grid"></div>

<div class="pagination" id="pagination"></div>

</div>

<div class="cart">

<h3>Order Cart</h3>

<table>

<thead>
<tr>
<th>Item</th>
<th>Rate</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>

<tbody id="cartItems"></tbody>

</table>

<h4 id="grandTotal">Total ₹0</h4>

<button class="order-btn" onclick="sendWhatsApp()">Send Order</button>

</div>

</div>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSHk_KwG4YCKte3jjsuGsXf_vPG_RsPQRexmJl_fIs0_Pjasq7I7g6nlxXskgncP6Xg6ca9__obX-5d/pub?gid=0&single=true&output=csv";

let rows=[];
let filtered=[];
let cart={};

let page=1;
const perPage=20;

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

rows=data.split("\n").slice(1).map(r=>r.split(","));
filtered=[...rows];

initCompanies();
render();

});

function initCompanies(){

let companies=[...new Set(rows.map(r=>r[0]))];

let select=document.getElementById("companyFilter");

companies.forEach(c=>{
let o=document.createElement("option");
o.value=c;
o.textContent=c;
select.appendChild(o);
});

}

function render(){

let start=(page-1)*perPage;
let pageRows=filtered.slice(start,start+perPage);

let html="";

pageRows.forEach(r=>{

let item=r[1];
let stock=parseInt(r[5])||0;
let rate=parseFloat(r[6])||0;

let expiry=new Date(r[4]);
let today=new Date();

let expired = expiry < today;

html+=`

<div class="card">

<h4>${item}</h4>

<div class="company">${r[0]}</div>

<div>Batch: ${r[2]}</div>
<div>Expiry: ${r[4]}</div>

<div class="price">₹${rate}</div>

${expired ? '<div class="expired">Expired</div>' :
`<div class="stock ${stock<5?'low':'good'}">Stock: ${stock}</div>`}

${expired ?
'<div class="expired">Not Available</div>' :
`<div class="qty">

<button onclick="addItem('${item}',${rate},-1)">-</button>

<span>${cart[item]?.qty||0}</span>

<button onclick="addItem('${item}',${rate},1)">+</button>

</div>`}

</div>

`;

});

document.getElementById("grid").innerHTML=html;

renderPagination();

}

function renderPagination(){

let pages=Math.ceil(filtered.length/perPage);

let html="";

for(let i=1;i<=pages;i++){
html+=`<button onclick="goPage(${i})">${i}</button>`;
}

document.getElementById("pagination").innerHTML=html;

}

function goPage(p){
page=p;
render();
}

function addItem(item,rate,change){

let product = rows.find(r => r[1] === item);

let stock = parseInt(product[5]) || 0;
let expiry = new Date(product[4]);
let today = new Date();

if(expiry < today){
alert("This batch is expired and cannot be ordered.");
return;
}

if(stock <= 0){
alert("Item out of stock.");
return;
}

if(!cart[item]) cart[item]={qty:0,rate:rate};

let newQty = cart[item].qty + change;

if(newQty > stock){
alert("Only "+stock+" units available.");
return;
}

cart[item].qty = Math.max(newQty,0);

updateCart();
render();

}

function updateCart(){

let html="";
let total=0;

for(let item in cart){

let q=cart[item].qty;
let r=cart[item].rate;

if(q>0){

let t=q*r;
total+=t;

html+=`
<tr>
<td>${item}</td>
<td>${r}</td>
<td>${q}</td>
<td>${t.toFixed(2)}</td>
</tr>
`;

}

}

document.getElementById("cartItems").innerHTML=html;
document.getElementById("grandTotal").innerText="Total ₹"+total.toFixed(2);

}

function sendWhatsApp(){

let shop=document.getElementById("shopName").value;
let mobile=document.getElementById("mobile").value;

let msg="Order for Aaradhya Pharmaceuticals%0A";

msg+="Shop: "+shop+"%0A";
msg+="Mobile: "+mobile+"%0A%0A";

for(let item in cart){

let q=cart[item].qty;
let r=cart[item].rate;

if(q>0){
msg+=item+" | "+r+" x "+q+"%0A";
}

}

window.open("https://wa.me/?text="+msg);

}

function applyFilters(){

let text=document.getElementById("search").value.toLowerCase();
let company=document.getElementById("companyFilter").value;

filtered=rows.filter(r=>{

let s=r.join(" ").toLowerCase().includes(text);
let c=!company||r[0]==company;

return s && c;

});

page=1;
render();

}

document.getElementById("search").addEventListener("keyup",applyFilters);
document.getElementById("companyFilter").addEventListener("change",applyFilters);

</script>

</body>
</html>
