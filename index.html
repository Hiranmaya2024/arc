<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aaradhya Partner Rewards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   TOKENS
══════════════════════════════════════════ */
:root {
  --navy:       #0D1F3C;
  --navy2:      #152d52;
  --navy3:      #1e3a63;
  --amber:      #F59E0B;
  --amber2:     #FBBF24;
  --amber-bg:   #FFFBEB;
  --green:      #16A34A;
  --green-bg:   #F0FDF4;
  --green-bd:   #86EFAC;
  --red:        #DC2626;
  --red-bg:     #FEF2F2;
  --red-bd:     #FECACA;
  --canvas:     #F0F2F5;
  --surface:    #FFFFFF;
  --surface2:   #F8FAFC;
  --border:     #E2E8F0;
  --border2:    #CBD5E1;
  --ink:        #0F172A;
  --ink2:       #334155;
  --muted:      #64748B;
  --faint:      #94A3B8;
  --r-lg:       16px;
  --r-md:       10px;
  --r-sm:       7px;
  --shadow-sm:  0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:  0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
  --shadow-card:0 0 0 1px rgba(0,0,0,.05), 0 2px 8px rgba(0,0,0,.06);
}
/* ══════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--canvas);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ══════════════════════════════════════════
   TOPBAR
══════════════════════════════════════════ */
.topbar{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);
  height:60px;padding:0 24px;display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 12px rgba(0,0,0,.25);
}
.logo{
  width:36px;height:36px;border-radius:9px;flex-shrink:0;
  background:var(--amber);display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:800;color:var(--navy);letter-spacing:-0.5px;
  box-shadow:0 2px 8px rgba(245,158,11,.4);
}
.topbar-text{flex:1;min-width:0}
.topbar-title{font-size:14px;font-weight:700;color:#fff;letter-spacing:-0.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
/* pill tabs */
.tab-capsule{background:rgba(255,255,255,.08);border-radius:9px;padding:3px;display:flex;gap:2px}
.tab-btn{padding:6px 15px;font-size:12px;font-weight:600;border-radius:7px;color:rgba(255,255,255,.5);transition:all .15s;letter-spacing:.01em}
.tab-btn.on{background:rgba(255,255,255,.16);color:#fff}
/* topbar action btns */
.tb-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;font-size:12px;font-weight:600;border-radius:8px;transition:all .15s;letter-spacing:.01em}
.tb-btn-ghost{background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.12)}
.tb-btn-ghost:hover{background:rgba(255,255,255,.14)}
.tb-btn-amber{background:var(--amber);color:var(--navy);border:1px solid var(--amber);font-weight:700}
.tb-btn-amber:hover{background:var(--amber2)}

/* ══════════════════════════════════════════
   PAGE SHELL
══════════════════════════════════════════ */
.main{max-width:980px;margin:0 auto;padding:24px 20px 48px}
.page{display:none}
.page.on{display:block}

/* ══════════════════════════════════════════
   PERIOD FILTER
══════════════════════════════════════════ */
.period-bar{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:22px}
.period-lbl{font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.07em;margin-right:2px}
.pill{padding:5px 14px;font-size:12px;font-weight:600;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);transition:all .15s;cursor:pointer}
.pill:hover{border-color:var(--border2);color:var(--ink2)}
.pill.on{background:var(--navy);color:#fff;border-color:var(--navy);box-shadow:0 2px 8px rgba(13,31,60,.25)}

/* ══════════════════════════════════════════
   LOADING / ERROR
══════════════════════════════════════════ */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;gap:14px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen p{font-size:14px;font-weight:500;color:var(--muted)}
.loading-screen small{font-size:12px;color:var(--faint)}
.err-box{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--r-md);padding:14px 18px;font-size:13px;color:var(--red);margin-bottom:20px}

/* ══════════════════════════════════════════
   DASHBOARD — METRICS ROW
══════════════════════════════════════════ */
.metrics-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:14px;margin-bottom:22px}
.mc{background:var(--surface);border-radius:var(--r-lg);padding:20px 22px;box-shadow:var(--shadow-card);border:1px solid var(--border)}
.mc.hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy3) 100%);border-color:transparent;box-shadow:0 4px 20px rgba(13,31,60,.3)}
.mc-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:12px}
.mc-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);margin-bottom:6px}
.mc.hero .mc-lbl{color:rgba(255,255,255,.45)}
.mc-val{font-size:30px;font-weight:800;color:var(--ink);letter-spacing:-0.03em;line-height:1}
.mc.hero .mc-val{color:var(--amber);font-size:26px}
.mc-sub{font-size:11px;color:var(--faint);margin-top:5px;font-weight:500}
.mc.hero .mc-sub{color:rgba(255,255,255,.35)}

/* ══════════════════════════════════════════
   DASHBOARD — SECTION WRAPPER
══════════════════════════════════════════ */
.section{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-card);border:1px solid var(--border);margin-bottom:16px;overflow:hidden}
.section-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);display:flex;align-items:center;gap:8px}
.section-title span{font-size:16px}
.section-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}

/* ══════════════════════════════════════════
   TIER GRID
══════════════════════════════════════════ */
.tier-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0;padding:0}
.tier-cell{padding:18px 10px;text-align:center;border-right:1px solid var(--border);position:relative;transition:background .15s;cursor:default}
.tier-cell:last-child{border-right:none}
.tier-cell::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.tier-cell:hover{background:var(--surface2)}
.tier-emoji-lg{font-size:24px;display:block;margin-bottom:6px;line-height:1}
.tier-name-sm{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.tier-count-lg{font-size:32px;font-weight:800;letter-spacing:-0.03em;line-height:1;margin-bottom:4px}
.tier-min-lbl{font-size:10px;color:var(--faint);font-weight:500}

/* ══════════════════════════════════════════
   TOP PURCHASERS
══════════════════════════════════════════ */
.top-row{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.top-row:last-child{border-bottom:none}
.top-row:hover{background:var(--surface2)}
.rank-bubble{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.top-info{flex:1;min-width:0}
.top-name{font-size:14px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-meta{font-size:11px;color:var(--faint);margin-top:2px;display:flex;align-items:center;gap:6px}
.top-right{text-align:right;flex-shrink:0}
.top-amount{font-size:15px;font-weight:800;color:var(--navy);letter-spacing:-0.01em}
.top-tier-pill{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;margin-top:4px;display:inline-block}
.chev-icon{color:var(--border2);font-size:16px;flex-shrink:0;margin-left:2px}

/* inline change badges */
.ibadge{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px;vertical-align:middle;margin-left:4px;white-space:nowrap}
.ibadge.up{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.ibadge.dn{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}

/* ══════════════════════════════════════════
   TIER CHANGES SECTION
══════════════════════════════════════════ */
.tc-head-promo{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--green);padding:9px 20px;background:#F0FDF4;border-bottom:1px solid var(--border);border-top:1px solid var(--border);display:flex;align-items:center;gap:6px}
.tc-head-demo{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--red);padding:9px 20px;background:var(--red-bg);border-bottom:1px solid var(--border);border-top:1px solid var(--border);display:flex;align-items:center;gap:6px}
.tc-row{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.tc-row:hover{background:var(--surface2)}
.tc-arrow{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.tc-info{flex:1;min-width:0}
.tc-name{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc-tiers{font-size:11px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:5px}
.tc-right{text-align:right;flex-shrink:0}
.tc-amt{font-size:13px;font-weight:700}
.tc-prev{font-size:10px;color:var(--faint);margin-top:2px}
.no-change-note{padding:18px 20px;text-align:center;font-size:13px;color:var(--faint)}

/* ══════════════════════════════════════════
   PARTNERS LIST
══════════════════════════════════════════ */
.search-bar{position:relative;margin-bottom:14px}
.search-bar svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--faint);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.search-input{width:100%;padding:11px 14px 11px 40px;border:1.5px solid var(--border);border-radius:var(--r-md);background:var(--surface);font-size:14px;font-family:inherit;color:var(--ink);outline:none;transition:border .15s;box-shadow:var(--shadow-sm)}
.search-input:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(13,31,60,.08)}
.search-input::placeholder{color:var(--faint)}

.plist{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-card);border:1px solid var(--border);overflow:hidden}
.plist-item{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;border-left:3px solid transparent}
.plist-item:last-child{border-bottom:none}
.plist-item:hover{background:var(--surface2)}
.p-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.p-info{flex:1;min-width:0}
.p-name{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-loc{font-size:11px;color:var(--faint);margin-top:2px}
.p-right{text-align:right;flex-shrink:0}
.p-amt{font-size:13px;font-weight:700;color:var(--navy)}
.p-tier-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:4px;display:inline-block}
.empty-note{padding:48px 24px;text-align:center;font-size:13px;color:var(--faint)}

/* ══════════════════════════════════════════
   PARTNER DETAIL — HERO
══════════════════════════════════════════ */
.det-hero{border-radius:var(--r-lg);padding:22px;margin-bottom:14px;border:1px solid transparent;border-left-width:5px;background:var(--surface);box-shadow:var(--shadow-card)}
.det-top{display:flex;align-items:flex-start;gap:16px;margin-bottom:18px}
.det-avatar{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0;letter-spacing:-.5px}
.det-name{font-size:20px;font-weight:800;color:var(--ink);letter-spacing:-0.02em;margin-bottom:6px;line-height:1.2}
.det-pills{display:flex;flex-wrap:wrap;align-items:center;gap:6px}
.det-tier-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
.chg-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;border:1.5px solid}
.chg-pill.up{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
.chg-pill.dn{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}

/* tier change banner */
.tier-banner{border-radius:var(--r-md);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.tier-banner.up{background:#F0FDF4;border:1px solid #BBF7D0}
.tier-banner.dn{background:var(--red-bg);border:1px solid var(--red-bd)}
.tb-icon{font-size:26px;flex-shrink:0;line-height:1}
.tb-label{font-size:13px;font-weight:700;margin-bottom:3px}
.tb-label.up{color:var(--green)}
.tb-label.dn{color:var(--red)}
.tb-tiers{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}

/* info grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.info-field{background:var(--surface2);border-radius:var(--r-sm);padding:10px 13px;border:1px solid var(--border)}
.info-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);margin-bottom:4px}
.info-val{font-size:13px;font-weight:600;color:var(--ink);word-break:break-word}
.info-val.mono{font-family:ui-monospace,'SF Mono',monospace;font-size:11px;letter-spacing:.03em}
.span2{grid-column:1/-1}
/* call/wa buttons */
.contact-btns{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px}
.cb{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:8px;font-size:12px;font-weight:700;transition:filter .15s;cursor:pointer;border:none}
.cb:hover{filter:brightness(1.08)}
.cb-call{background:var(--navy);color:#fff}
.cb-wa{background:#25D366;color:#fff}

/* stats strip */
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat-cell{background:var(--surface2);border-radius:var(--r-md);padding:13px 10px;text-align:center;border:1px solid var(--border);position:relative;overflow:hidden}
.stat-cell::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-num{font-size:17px;font-weight:800;letter-spacing:-0.02em;line-height:1;margin-bottom:4px}
.stat-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--faint)}
.stat-diff{font-size:10px;font-weight:700;margin-top:5px}

/* ══════════════════════════════════════════
   QUEST CARD
══════════════════════════════════════════ */
.quest-wrap{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-card);border:1px solid var(--border);overflow:hidden;margin-bottom:14px}
.quest-hd{padding:0;display:flex;align-items:stretch}
.quest-hd-left{background:linear-gradient(135deg,var(--navy) 0%,var(--navy3) 100%);padding:16px 20px;flex:1;display:flex;align-items:center;gap:10px}
.quest-hd-icon{font-size:22px;line-height:1}
.quest-hd-text{}
.quest-hd-title{font-size:13px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.06em}
.quest-hd-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.quest-hd-right{background:rgba(245,158,11,.12);padding:16px 18px;display:flex;align-items:center;gap:8px;border-left:1px solid rgba(245,158,11,.2)}
.quest-score{text-align:center}
.quest-score-num{font-size:24px;font-weight:800;color:var(--amber);line-height:1}
.quest-score-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.4);margin-top:2px}

/* progress ring */
.ring-wrap{position:relative;width:52px;height:52px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--amber)}

.quest-list{}
.quest-item{display:flex;align-items:center;gap:14px;padding:15px 20px;border-bottom:1px solid var(--border);transition:background .12s}
.quest-item:last-child{border-bottom:none}
.quest-item:hover{background:var(--surface2)}
.q-icon-box{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.q-body{flex:1;min-width:0}
.q-name{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:3px}
.q-desc{font-size:11px;color:var(--faint);margin-bottom:8px}
.q-bar-track{height:7px;background:var(--border);border-radius:7px;overflow:hidden;margin-bottom:5px}
.q-bar-fill{height:100%;border-radius:7px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.q-prog-row{display:flex;justify-content:space-between;align-items:center}
.q-prog-val{font-size:11px;font-weight:600}
.q-tip{font-size:10px;color:var(--faint)}
.q-status-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;min-width:44px}
.q-ring{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;border:2.5px solid}
.q-ring.done{background:#DCFCE7;color:var(--green);border-color:var(--green-bd)}
.q-ring.mid{background:var(--amber-bg);color:#B45309;border-color:#FCD34D}
.q-ring.low{background:var(--surface2);color:var(--faint);border-color:var(--border)}
.q-pct{font-size:10px;font-weight:700}

/* ══════════════════════════════════════════
   ORDER HISTORY
══════════════════════════════════════════ */
.orders-wrap{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-card);border:1px solid var(--border);overflow:hidden}
.orders-hd{padding:14px 20px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);display:flex;align-items:center;justify-content:space-between}
.orders-tbl{width:100%;border-collapse:collapse;font-size:13px}
.orders-tbl th{padding:9px 18px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);background:var(--surface2);border-bottom:1px solid var(--border)}
.orders-tbl td{padding:10px 18px;border-bottom:1px solid var(--border);color:var(--ink2)}
.orders-tbl tr:last-child td{border-bottom:none}
.orders-tbl tr:hover td{background:var(--surface2)}
.oid{font-family:ui-monospace,'SF Mono',monospace;font-size:11px;color:var(--faint)}
.mo-chip{font-size:10px;font-weight:700;background:var(--navy);color:rgba(255,255,255,.85);padding:3px 9px;border-radius:6px;display:inline-block}
.amt-cell{text-align:right;font-weight:700;color:var(--navy);font-size:13px}
.tbl-more{text-align:center;padding:12px;font-size:11px;color:var(--faint);border-top:1px solid var(--border)}

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media(max-width:680px){

<script>
/* ═══════════ CONSTANTS ═══════════ */
const SHEET_ID = '17bW1LAfb4QxzGa7cNG_qsFjR6pdt5Q7D34IKBSRH-Lg';
const CSV = 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&sheet=';

let customers=[], orders=[], allMonths=[];
let selMonth='All', navStack=['dashboard'];

const MMAP={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};

/* ═══════════ TIER CONFIG ═══════════ */
const TIERS=[
  {name:'Diamond', full:'Diamond Partner', emoji:'💎', min:100000, color:'#1D4ED8', bg:'#EFF6FF', border:'#93C5FD', text:'#1E40AF'},
  {name:'Platinum',full:'Platinum Partner',emoji:'🌟', min:70000,  color:'#7C3AED', bg:'#F5F3FF', border:'#C4B5FD', text:'#5B21B6'},
  {name:'Gold',    full:'Gold Partner',    emoji:'🥇', min:50000,  color:'#B45309', bg:'#FFFBEB', border:'#FCD34D', text:'#78350F'},
  {name:'Silver',  full:'Silver Partner',  emoji:'🥈', min:20000,  color:'#475569', bg:'#F1F5F9', border:'#CBD5E1', text:'#334155'},
  {name:'Bronze',  full:'Bronze Partner',  emoji:'🥉', min:10000,  color:'#92400E', bg:'#FFF7ED', border:'#FCA172', text:'#7C2D12'},
];
const UNRANKED={name:'Unranked',full:'Unranked',emoji:'◦',min:0,color:'#94A3B8',bg:'#F8FAFC',border:'#E2E8F0',text:'#64748B'};

function getTier(amt){ for(const t of TIERS) if(amt>=t.min) return t; return UNRANKED; }
function tRank(t){ const i=TIERS.findIndex(x=>x.name===t.name); return i===-1?-1:TIERS.length-1-i; }

/* ═══════════ UTILS ═══════════ */
function fmtINR(n){ return '₹'+Math.round(n).toLocaleString('en-IN'); }
function moVal(m){ const p=m.split('-'); return parseInt(p[1]||0)*12+(MMAP[p[0]]||0); }
function ini(name){ return (name||'').split(/\s+/).map(w=>w[0]||'').join('').slice(0,2).toUpperCase()||'?'; }

/* ═══════════ CSV PARSER ═══════════ */
function parseCSV(txt){
  const rows=[]; let cur='',inQ=false,row=[];
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(c==='"'){if(inQ&&txt[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){row.push(cur.trim());cur='';}
    else if((c==='\n'||c==='\r')&&!inQ){
      if(c==='\r'&&txt[i+1]==='\n')i++;
      row.push(cur.trim());cur='';
      if(row.some(x=>x!==''))rows.push(row);
      row=[];
    } else cur+=c;
  }
  if(row.length){row.push(cur.trim());if(row.some(x=>x!==''))rows.push(row);}
  return rows;
}
async function fetchSheet(name){
  const r=await fetch(CSV+encodeURIComponent(name));
  if(!r.ok) throw new Error('Cannot read "'+name+'"');
  return parseCSV(await r.text());
}

/* ═══════════ LOAD ═══════════ */
async function loadData(){
  document.getElementById('loading-screen').style.display='flex';
  document.getElementById('err-box').style.display='none';
  ['dashboard','details','detail'].forEach(p=>document.getElementById('page-'+p).classList.remove('on'));
  try{
    const [cr,or]=await Promise.all([fetchSheet('1_CUSTOMERS'),fetchSheet('2_ORDERS')]);
    customers=[];
    for(let i=1;i<cr.length;i++){
      const r=cr[i]; if(!r[0]||!r[1]) continue;
      customers.push({id:r[0],name:r[1],owner:r[2]||'',mobile:r[3]||'',address:r[5]||'',city:r[6]||'',district:r[7]||'',license:r[9]||''});
    }
    orders=[];
    for(let i=1;i<or.length;i++){
      const r=or[i]; if(!r[0]) continue;
      const amt=parseFloat((r[6]||'').replace(/[₹,\s]/g,''))||0;
      orders.push({id:r[0],custId:r[1]||'',bizName:r[2]||'',date:r[3]||'',month:r[4]||'',amount:amt});
    }
    allMonths=[...new Set(orders.map(o=>o.month).filter(Boolean))].sort((a,b)=>moVal(b)-moVal(a));
    buildPills(); renderDash(); buildBizList();
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('data-status').textContent='Live · '+customers.length+' partners · '+orders.length+' orders';
    showPage('dashboard');
  }catch(e){
    document.getElementById('loading-screen').style.display='none';
    const el=document.getElementById('err-box');
    el.style.display='block';
    el.innerHTML='<strong>Could not load data:</strong> '+e.message+' — Make sure the sheet is public (Anyone with the link → Viewer).';
  }
}

/* ═══════════ PERIOD PILLS ═══════════ */
function buildPills(){
  const c=document.getElementById('period-pills'); c.innerHTML='';
  ['All',...allMonths].forEach(m=>{
    const b=document.createElement('button');
    b.className='pill'+(m===selMonth?' on':'');
    b.textContent=m;
    b.onclick=()=>{selMonth=m;buildPills();renderDash();};
    c.appendChild(b);
  });
}

/* ═══════════ AGGREGATION ═══════════ */
function filtOrd(){ return selMonth==='All'?orders:orders.filter(o=>o.month===selMonth); }
function totalsFrom(ords){
  const t={};
  ords.forEach(o=>{if(!o.custId||o.custId.toLowerCase()==='unknown')return; t[o.custId]=(t[o.custId]||0)+o.amount;});
  return t;
}
function nameMapFrom(ords){
  const m={};
  ords.forEach(o=>{if(o.custId&&o.bizName)m[o.custId]=o.bizName;});
  return m;
}

/* per-customer tier change between two months */
function buildChangeMap(curMo,prevMo){
  const cm=curMo ?totalsFrom(orders.filter(o=>o.month===curMo)) :{};
  const pm=prevMo?totalsFrom(orders.filter(o=>o.month===prevMo)):{};
  const map={};
  [...new Set([...Object.keys(cm),...Object.keys(pm)])].forEach(id=>{
    const ca=cm[id]||0,pa=pm[id]||0;
    const ct=getTier(ca),pt=getTier(pa);
    if(tRank(ct)!==tRank(pt))
      map[id]={curAmt:ca,prevAmt:pa,curTier:ct,prevTier:pt,change:tRank(ct)>tRank(pt)?'up':'dn'};
  });
  return map;
}

/* ═══════════ DASHBOARD ═══════════ */
function renderDash(){
  const ords=filtOrd();
  const totals=totalsFrom(ords);
  const ids=Object.keys(totals);
  const rev=ords.reduce((s,o)=>s+o.amount,0);

  const curMo =selMonth!=='All'?selMonth:(allMonths[0]||'');
  const prevMo=selMonth!=='All'?allMonths[allMonths.indexOf(selMonth)+1]||'':(allMonths[1]||'');
  const chgMap=buildChangeMap(curMo,prevMo);

  /* — Metrics — */
  document.getElementById('metrics-area').innerHTML=`
    <div class="mc hero">
      <div class="mc-icon" style="background:rgba(245,158,11,.15)">💰</div>
      <div class="mc-lbl">Total Revenue</div>
      <div class="mc-val">${fmtINR(rev)}</div>
      <div class="mc-sub">${selMonth==='All'?'All time':selMonth}</div>
    </div>
    <div class="mc">
      <div class="mc-icon" style="background:#EFF6FF">🤝</div>
      <div class="mc-lbl">Active Partners</div>
      <div class="mc-val">${ids.length}</div>
      <div class="mc-sub">with orders placed</div>
    </div>
    <div class="mc">
      <div class="mc-icon" style="background:#F0FDF4">📋</div>
      <div class="mc-lbl">Total Orders</div>
      <div class="mc-val">${ords.length}</div>
      <div class="mc-sub">transactions</div>
    </div>`;

  /* — Tier grid — */
  document.getElementById('tier-sub-lbl').textContent=selMonth==='All'?'All time':selMonth;
  document.getElementById('tier-grid-area').innerHTML=TIERS.map((t,i)=>{
    const nextMin=i>0?TIERS[i-1].min:Infinity;
    const cnt=ids.filter(id=>totals[id]>=t.min&&totals[id]<nextMin).length;
    return `<div class="tier-cell" style="border-top-color:${t.color}">
      <span class="tier-emoji-lg">${t.emoji}</span>
      <div class="tier-name-sm" style="color:${t.color}">${t.name}</div>
      <div class="tier-count-lg" style="color:${t.text}">${cnt}</div>
      <div class="tier-min-lbl">≥ ${fmtINR(t.min)}</div>
    </div>`;
  }).join('');

  /* — Top 5 — */
  const names=nameMapFrom(ords);
  const top5=ids.sort((a,b)=>totals[b]-totals[a]).slice(0,5);
  const medals=[
    {bg:'#FEF3C7',c:'#D97706',lbl:'#1 🥇'},
    {bg:'#F1F5F9',c:'#64748B',lbl:'#2 🥈'},
    {bg:'#FFF7ED',c:'#B45309',lbl:'#3 🥉'},
    {bg:'#F3F4F6',c:'#9CA3AF',lbl:'#4'},
    {bg:'#F3F4F6',c:'#9CA3AF',lbl:'#5'},
  ];
  document.getElementById('top-list-area').innerHTML=top5.length===0
    ?'<div class="empty-note">No orders in this period</div>'
    :top5.map((id,i)=>{
      const m=medals[i]; const tier=getTier(totals[id]); const chg=chgMap[id];
      const badge=chg?`<span class="ibadge ${chg.change}">${chg.change==='up'?'▲':'▼'} ${chg.curTier.name}</span>`:'';
      return `<div class="top-row" onclick="showDetailById('${id}')">
        <div class="rank-bubble" style="background:${m.bg};color:${m.c}">${m.lbl}</div>
        <div class="top-info">
          <div class="top-name">${names[id]||id}</div>
          <div class="top-meta">${tier.emoji} ${tier.full}</div>
        </div>
        <div class="top-right">
          <div class="top-amount">${fmtINR(totals[id])} ${badge}</div>
          <div class="top-tier-pill" style="background:${tier.bg};color:${tier.color}">${tier.full}</div>
        </div>
        <div class="chev-icon">›</div>
      </div>`;
    }).join('');

  /* — Tier change section — */
  renderTierChangeSection(chgMap,curMo,prevMo,names);
}

function renderTierChangeSection(chgMap,curMo,prevMo,names){
  const sec=document.getElementById('tc-section');
  if(!curMo||!prevMo){sec.innerHTML='';return;}
  const promoted=Object.entries(chgMap).filter(([,v])=>v.change==='up');
  const demoted =Object.entries(chgMap).filter(([,v])=>v.change==='dn');
  if(!promoted.length&&!demoted.length){
    sec.innerHTML=`<div class="section"><div class="section-head"><div class="section-title"><span>⇄</span> Tier Changes</div><div class="section-badge">${prevMo} → ${curMo}</div></div><div class="no-change-note">No tier changes between ${prevMo} and ${curMo}</div></div>`;
    return;
  }
  const mkRows=(list,type)=>list.sort((a,b)=>b[1].curAmt-a[1].curAmt).map(([id,v])=>{
    const arrow=type==='up'?`<span style="color:var(--green);font-size:20px">▲</span>`:`<span style="color:var(--red);font-size:20px">▼</span>`;
    const amtColor=type==='up'?'var(--green)':'var(--red)';
    return `<div class="tc-row" onclick="showDetailById('${id}')">
      <div class="tc-arrow">${arrow}</div>
      <div class="tc-info">
        <div class="tc-name">${names[id]||id}</div>
        <div class="tc-tiers">${v.prevTier.emoji}<span style="color:var(--muted)">${v.prevTier.full}</span><span style="color:var(--faint)">→</span><span style="color:${v.curTier.color};font-weight:700">${v.curTier.emoji} ${v.curTier.full}</span></div>
      </div>
      <div class="tc-right">
        <div class="tc-amt" style="color:${amtColor}">${fmtINR(v.curAmt)}</div>
        <div class="tc-prev">prev: ${fmtINR(v.prevAmt)}</div>
      </div>
      <div class="chev-icon">›</div>
    </div>`;
  }).join('');

  const promoCount=promoted.length,demoCount=demoted.length;
  sec.innerHTML=`<div class="section">
    <div class="section-head">
      <div class="section-title"><span>⇄</span> Tier Changes</div>
      <div style="display:flex;gap:8px">
        ${promoCount?`<span class="ibadge up">▲ ${promoCount} Promoted</span>`:''}
        ${demoCount ?`<span class="ibadge dn">▼ ${demoCount} Demoted</span>`:''}
      </div>
    </div>
    <div style="padding:8px 20px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;color:var(--faint)">Comparing <strong style="color:var(--ink2)">${prevMo}</strong> vs <strong style="color:var(--ink2)">${curMo}</strong></div>
    ${promoted.length?`<div class="tc-head-promo">▲ Promotions (${promoCount})</div>${mkRows(promoted,'up')}`:''}
    ${demoted.length ?`<div class="tc-head-demo">▼ Demotions (${demoCount})</div>${mkRows(demoted,'dn')}`:''}
  </div>`;
}

/* ═══════════ PARTNERS LIST ═══════════ */
function buildBizList(){
  const t=totalsFrom(orders);
  window._AT=t;
  const cm=allMonths[0]||'', pm=allMonths[1]||'';
  window._BizChg=buildChangeMap(cm,pm);
  const sorted=[...customers].sort((a,b)=>(t[b.id]||0)-(t[a.id]||0));
  window._SC=sorted;
  renderPList(sorted);
}
function renderPList(list){
  const t=window._AT||{}, chg=window._BizChg||{};
  if(!list.length){document.getElementById('plist-area').innerHTML='<div class="empty-note">No partners found</div>';return;}
  document.getElementById('plist-area').innerHTML=list.slice(0,200).map(c=>{
    const amt=t[c.id]||0, tier=getTier(amt), av=ini(c.name);
    const ch=chg[c.id];
    const badge=ch?`<span class="ibadge ${ch.change}" style="margin-left:5px">${ch.change==='up'?'▲':'▼'} ${ch.curTier.name}</span>`:'';
    return `<div class="plist-item" onclick="showDetailById('${c.id}')"
      onmouseenter="this.style.borderLeftColor='${tier.color}'" onmouseleave="this.style.borderLeftColor='transparent'">
      <div class="p-avatar" style="background:${tier.bg};color:${tier.color}">${av}</div>
      <div class="p-info">
        <div class="p-name">${c.name}</div>
        <div class="p-loc">${[c.city,c.district].filter(Boolean).join(' · ')||'Location not set'}</div>
      </div>
      <div class="p-right">
        ${amt>0?`<div class="p-amt">${fmtINR(amt)}${badge}</div>`:'<div style="font-size:12px;color:var(--faint)">No orders</div>'}
        <div class="p-tier-tag" style="background:${tier.bg};color:${tier.color}">${tier.emoji} ${tier.full}</div>
      </div>
      <div class="chev-icon">›</div>
    </div>`;
  }).join('');
}
function filterBiz(){
  const q=document.getElementById('search-input').value.toLowerCase();
  renderPList((window._SC||[]).filter(c=>c.name.toLowerCase().includes(q)||c.city.toLowerCase().includes(q)||c.district.toLowerCase().includes(q)));
}

/* ═══════════ QUEST ENGINE ═══════════ */
function computeQuests(custId,curMo,prevMo){
  const cOrds=orders.filter(o=>o.custId===custId&&o.month===curMo);
  const pOrds=orders.filter(o=>o.custId===custId&&o.month===prevMo);
  const cnt=cOrds.length;
  const tot=cOrds.reduce((s,o)=>s+o.amount,0);
  const ptot=pOrds.reduce((s,o)=>s+o.amount,0);
  const ct=getTier(tot), pt=getTier(ptot);
  const sameLeague=curMo&&prevMo&&tRank(ct)===tRank(pt)&&tRank(ct)>tRank(UNRANKED);

  /* Q1 */
  const q1t=2,q1v=Math.min(cnt,q1t),q1d=cnt>=q1t,q1p=Math.min(100,Math.round(q1v/q1t*100));
  /* Q2 */
  const q2t=20000,q2v=Math.min(tot,q2t),q2d=tot>=q2t,q2p=Math.min(100,Math.round(q2v/q2t*100));
  /* Q3 */
  const q3d=sameLeague,q3p=q3d?100:(prevMo&&ptot>0&&tot>0?50:(tot>0?25:0));

  return [
    {icon:'📦',name:'Frequent Buyer',desc:'Place at least 2 orders this month',
     pct:q1p,done:q1d,color:'#6366F1',
     progLbl:`${cnt} / 2 orders`,
     tip:q1d?'Quest complete! 🎉':`${q1t-cnt} more order${q1t-cnt>1?'s':''} needed`},
    {icon:'💰',name:'High Spender',desc:'Purchase ₹20,000 or more this month',
     pct:q2p,done:q2d,color:'#D97706',
     progLbl:`${fmtINR(tot)} / ${fmtINR(q2t)}`,
     tip:q2d?'Quest complete! 🎉':`${fmtINR(q2t-tot)} more to go`},
    {icon:'🏆',name:'League Loyalist',desc:'Stay in the same tier for two consecutive months',
     pct:q3p,done:q3d,color:'#0EA5E9',
     progLbl:q3d?`${prevMo} + ${curMo} — ${ct.full}`
       :(prevMo&&ptot>0?`${pt.emoji} ${pt.name} → ${ct.emoji} ${ct.name}`
         :`Active in ${curMo||'current month'}`),
     tip:q3d?'Quest complete! 🎉'
       :(prevMo&&ptot>0&&tot>0?`Tiers differ — hold ${ct.name} next month`
         :'Need activity in both months')},
  ];
}

function questHTML(quests,curMo){
  const done=quests.filter(q=>q.done).length;
  const avg=Math.round(quests.reduce((s,q)=>s+q.pct,0)/quests.length);
  /* SVG ring */
  const R=20,C=2*Math.PI*R,fill=Math.round(avg/100*C);
  const ringHTML=`<div class="ring-wrap">
    <svg width="52" height="52" viewBox="0 0 52 52">
      <circle cx="26" cy="26" r="${R}" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="5"/>
      <circle cx="26" cy="26" r="${R}" fill="none" stroke="${avg===100?'#22C55E':'#F59E0B'}" stroke-width="5"
        stroke-dasharray="${fill} ${C}" stroke-linecap="round"/>
    </svg>
    <div class="ring-val">${avg}%</div>
  </div>`;

  const items=quests.map(q=>{
    const rc=q.done?'done':q.pct>=50?'mid':'low';
    const ic=q.done?'✓':q.pct>=50?'◑':'○';
    const bc=q.done?'#22C55E':q.pct>=50?q.color:'#CBD5E1';
    const pc=q.done?'var(--green)':q.pct>=50?q.color:'var(--faint)';
    return `<div class="quest-item">
      <div class="q-icon-box" style="background:${q.color}15;border:1px solid ${q.color}25">${q.icon}</div>
      <div class="q-body">
        <div class="q-name">${q.name}</div>
        <div class="q-desc">${q.desc}</div>
        <div class="q-bar-track"><div class="q-bar-fill" style="width:${q.pct}%;background:${bc}"></div></div>
        <div class="q-prog-row">
          <span class="q-prog-val" style="color:${pc}">${q.progLbl}</span>
          <span class="q-tip">${q.tip}</span>
        </div>
      </div>
      <div class="q-status-col">
        <div class="q-ring ${rc}">${ic}</div>
        <div class="q-pct" style="color:${pc}">${q.pct}%</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="quest-wrap">
    <div class="quest-hd">
      <div class="quest-hd-left">
        <div class="quest-hd-icon">⚔️</div>
        <div class="quest-hd-text">
          <div class="quest-hd-title">Monthly Quests</div>
          <div class="quest-hd-sub">${curMo||'Current Month'}</div>
        </div>
      </div>
      <div class="quest-hd-right">
        ${ringHTML}
        <div class="quest-score">
          <div class="quest-score-num">${done}/${quests.length}</div>
          <div class="quest-score-lbl">Done</div>
        </div>
      </div>
    </div>
    <div class="quest-list">${items}</div>
  </div>`;
}

/* ═══════════ PARTNER DETAIL ═══════════ */
function showDetailById(custId){
  const c=customers.find(x=>x.id===custId); if(!c) return;
  const curMo=allMonths[0]||'', prevMo=allMonths[1]||'';
  const cOrds=orders.filter(o=>o.custId===custId);
  const mOrds=cOrds.filter(o=>o.month===curMo);
  const pOrds=cOrds.filter(o=>o.month===prevMo);
  const mAmt=mOrds.reduce((s,o)=>s+o.amount,0);
  const pAmt=pOrds.reduce((s,o)=>s+o.amount,0);
  const mCnt=mOrds.length;
  const aAmt=cOrds.reduce((s,o)=>s+o.amount,0);
  const aCnt=cOrds.length;
  const tier=getTier(mAmt);
  const av=ini(c.name);

  /* tier change */
  const ct=getTier(mAmt),pt=getTier(pAmt);
  const tierChg=tRank(ct)!==tRank(pt)?(tRank(ct)>tRank(pt)?'up':'dn'):null;
  const chgBadge=tierChg?`<span class="chg-pill ${tierChg}">${tierChg==='up'?'▲ Promoted':'▼ Demoted'}</span>`:'';
  const chgBanner=tierChg?`<div class="tier-banner ${tierChg}">
    <div class="tb-icon">${tierChg==='up'?'🚀':'📉'}</div>
    <div>
      <div class="tb-label ${tierChg}">${tierChg==='up'?'Tier Promoted!':'Tier Demoted'} — ${prevMo} → ${curMo}</div>
      <div class="tb-tiers">${pt.emoji} <strong>${pt.full}</strong> <span style="color:var(--faint)">→</span> <strong style="color:${ct.color}">${ct.emoji} ${ct.full}</strong></div>
    </div>
  </div>`:'';

  /* MoM diff */
  const diff=mAmt-pAmt, dSign=diff>=0?'+':'', dColor=diff>=0?'var(--green)':'var(--red)';

  /* sort orders */
  const parseDt=d=>{const p=d.split('-');return p.length===3?new Date(2000+parseInt(p[2]),MMAP[p[1]]||1,parseInt(p[0])):new Date(0);};
  const sOrds=cOrds.slice().sort((a,b)=>parseDt(b.date)-parseDt(a.date));

  /* quests */
  const quests=computeQuests(custId,curMo,prevMo);

  document.getElementById('page-detail').innerHTML=`
    <div class="det-hero" style="border-left-color:${tier.color}">
      <div class="det-top">
        <div class="det-avatar" style="background:${tier.bg};color:${tier.color}">${av}</div>
        <div style="flex:1;min-width:0">
          <div class="det-name">${c.name}</div>
          <div class="det-pills">
            <span class="det-tier-pill" style="background:${tier.bg};color:${tier.color}">${tier.emoji} ${tier.full}</span>
            ${chgBadge}
          </div>
        </div>
      </div>
      ${chgBanner}
      <div class="info-grid">
        <div class="info-field">
          <div class="info-lbl">Customer ID</div>
          <div class="info-val mono">${c.id}</div>
        </div>
        <div class="info-field">
          <div class="info-lbl">Owner Name</div>
          <div class="info-val">${c.owner||'—'}</div>
        </div>
        <div class="info-field span2">
          <div class="info-lbl">Mobile / WhatsApp</div>
          ${c.mobile?`<div class="info-val" style="margin-bottom:9px">${c.mobile}</div>
          <div class="contact-btns">
            <a href="tel:${c.mobile}" class="cb cb-call">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.82a16 16 0 0 0 6.29 6.29l.98-.98a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              Call
            </a>
            <a href="https://wa.me/91${c.mobile.replace(/\D/g,'')}" target="_blank" class="cb cb-wa">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
              WhatsApp
            </a>
          </div>`:'<div class="info-val">—</div>'}
        </div>
        <div class="info-field">
          <div class="info-lbl">City · District</div>
          <div class="info-val">${[c.city,c.district].filter(Boolean).join(' · ')||'—'}</div>
        </div>
        <div class="info-field">
          <div class="info-lbl">Drug Licence No.</div>
          <div class="info-val mono">${c.license||'—'}</div>
        </div>
        <div class="info-field span2">
          <div class="info-lbl">Address</div>
          <div class="info-val">${c.address||'—'}</div>
        </div>
      </div>
      <div class="stats-strip">
        <div class="stat-cell" style="--c:${tier.color}">
          <div style="position:absolute;top:0;left:0;right:0;height:2px;background:${tier.color}"></div>
          <div class="stat-num" style="color:${tier.color}">${fmtINR(mAmt)}</div>
          <div class="stat-lbl">${curMo||'This month'}</div>
          ${pAmt>0?`<div class="stat-diff" style="color:${dColor}">${dSign}${fmtINR(diff)}</div>`:''}
        </div>
        <div class="stat-cell">
          <div class="stat-num" style="color:${tier.color}">${mCnt}</div>
          <div class="stat-lbl">Orders · ${curMo}</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num" style="color:var(--muted)">${fmtINR(pAmt)}</div>
          <div class="stat-lbl">${prevMo||'Prev month'}</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num" style="color:var(--navy)">${fmtINR(aAmt)}</div>
          <div class="stat-lbl">All-time</div>
        </div>
      </div>
    </div>

    ${questHTML(quests,curMo)}

    ${sOrds.length>0?`
    <div class="orders-wrap">
      <div class="orders-hd">
        <span>Order History</span>
        <span>${aCnt} orders</span>
      </div>
      <table class="orders-tbl">
        <thead><tr><th>Order ID</th><th>Date</th><th>Month</th><th style="text-align:right">Amount</th></tr></thead>
        <tbody>${sOrds.slice(0,25).map(o=>`<tr>
          <td><span class="oid">${o.id}</span></td>
          <td style="color:var(--ink2)">${o.date}</td>
          <td><span class="mo-chip">${o.month}</span></td>
          <td class="amt-cell">${fmtINR(o.amount)}</td>
        </tr>`).join('')}</tbody>
      </table>
      ${aCnt>25?`<div class="tbl-more">Showing 25 of ${aCnt} orders</div>`:''}
    </div>`
    :`<div class="empty-note" style="background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);padding:40px">No orders found for this partner</div>`}
  `;
  showPage('detail');
}

/* ═══════════ NAVIGATION ═══════════ */
function showPage(page){
  ['dashboard','details','detail'].forEach(p=>document.getElementById('page-'+p).classList.remove('on'));
  document.getElementById('page-'+page).classList.add('on');
  const isD=page==='detail';
  document.getElementById('main-tabs').style.display=isD?'none':'flex';
  document.getElementById('nav-back').style.display=isD?'block':'none';
  document.getElementById('nav-home').style.display=isD?'block':'none';
  if(navStack[navStack.length-1]!==page) navStack.push(page);
  if(!isD) document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('on',(page==='dashboard'&&i===0)||(page==='details'&&i===1)));
  window.scrollTo(0,0);
}
function switchTab(page,el){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on'); navStack=[page]; showPage(page);
}
function goHome(){navStack=['dashboard'];showPage('dashboard');}
function goBack(){navStack.pop();showPage(navStack[navStack.length-1]||'dashboard');}

loadData();
</script>
