<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Aaradhya Pharmaceuticals Ordering</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#f4f6f9;
}

header{
background:#0b5ed7;
color:white;
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
}

.version{
font-size:13px;
background:white;
color:#0b5ed7;
padding:4px 10px;
border-radius:6px;
}

.login{
max-width:380px;
margin:80px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.2);
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#0b5ed7;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

#app{
display:none;
}

.container{
display:grid;
grid-template-columns:1fr 320px;
gap:20px;
padding:20px;
max-width:1400px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:18px;
}

.card{
background:white;
padding:14px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
gap:4px;
min-height:160px;
}

.medicine{
font-weight:600;
font-size:14px;
word-break:break-word;
}

.company{
font-size:12px;
color:#666;
}

.badges{
display:flex;
gap:6px;
margin-top:4px;
flex-wrap:wrap;
}

.badge{
font-size:11px;
padding:3px 6px;
border-radius:4px;
}

.stock-good{
background:#e8f8f0;
color:#1e8449;
}

.stock-low{
background:#fdecea;
color:#c0392b;
}

.expired{
background:#f8d7da;
color:#c0392b;
}

.qty{
display:flex;
justify-content:center;
gap:6px;
margin-top:6px;
}

.qty button{
width:26px;
height:26px;
}

.cart{
background:white;
padding:18px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.15);
position:sticky;
top:20px;
height:fit-content;
}

.cart table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

.cart th{
border-bottom:1px solid #ddd;
padding:6px;
text-align:left;
}

.cart td{
padding:6px;
border-bottom:1px solid #eee;
}

.cart-total{
margin-top:10px;
font-weight:600;
font-size:16px;
}

.order-btn{
background:#25D366;
width:100%;
margin-top:10px;
}

.pagination{
display:flex;
justify-content:center;
gap:6px;
margin-top:20px;
}

.pagination button{
padding:6px 10px;
font-size:13px;
}

.active-page{
background:#25D366;
}

.filters{
display:flex;
gap:10px;
margin-bottom:10px;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<header>

<div>Aaradhya Pharmaceuticals Ordering</div>

<div class="version">Version 7</div>

</header>

<div class="login" id="login">

<h3>Retailer Login</h3>

<input id="shop" placeholder="Shop Name">
<input id="mobile" placeholder="Mobile Number">

<button onclick="login()">Login</button>

</div>

<div id="app">

<div class="container">

<div>

<div class="filters">

<input id="search" placeholder="Search medicine">

<select id="companyFilter">
<option value="">All Companies</option>
</select>

</div>

<div class="grid" id="grid"></div>

<div class="pagination" id="pagination"></div>

</div>

<div class="cart">

<h3>Order Cart</h3>

<table>

<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>

<tbody id="cartItems"></tbody>

</table>

<div class="cart-total" id="total">Total ₹0</div>

<button class="order-btn" onclick="placeOrder()">Place Order</button>

</div>

</div>

</div>

<script>

const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSHk_KwG4YCKte3jjsuGsXf_vPG_RsPQRexmJl_fIs0_Pjasq7I7g6nlxXskgncP6Xg6ca9__obX-5d/pub?gid=0&single=true&output=csv";

const ORDER_API="https://script.google.com/macros/s/AKfycby3QoqXU5UI_ofm_NX6F7wH4X84hAwArPFMZ4BOkn1KmRs0JpLFRJO91f63YSmupgejOg/exec";

let rows=[];
let cart={};

let currentPage=1;
let perPage=30;

fetch(SHEET_URL)
.then(r=>r.text())
.then(data=>{
rows=data.split("\n").slice(1).map(r=>r.split(","));
initCompanyFilter();
render();
});

function login(){

let shop=document.getElementById("shop").value;

if(shop=="") return alert("Enter shop name");

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

}

function initCompanyFilter(){

let companies=[...new Set(rows.map(r=>r[0]))];

let select=document.getElementById("companyFilter");

companies.forEach(c=>{

let opt=document.createElement("option");
opt.value=c;
opt.textContent=c;

select.appendChild(opt);

});

}

function render(){

let search=document.getElementById("search").value?.toLowerCase() || "";
let company=document.getElementById("companyFilter").value;

let filtered=rows.filter(r=>{

let matchSearch=r[1].toLowerCase().includes(search);
let matchCompany=!company || r[0]==company;

return matchSearch && matchCompany;

});

let start=(currentPage-1)*perPage;
let pageItems=filtered.slice(start,start+perPage);

let html="";

pageItems.forEach(r=>{

let item=r[1];
let stock=parseInt(r[5]);
let rate=parseFloat(r[6]);
let exp=new Date(r[4]);

let expired=exp < new Date();

html+=`

<div class="card">

<div class="medicine">${item}</div>

<div class="company">${r[0]}</div>

<div>Rate ₹${rate}</div>

<div class="badges">

<span class="badge ${stock<10?'stock-low':'stock-good'}">
Stock: ${stock}
</span>

${expired?'<span class="badge expired">Expired</span>':''}

</div>

<div class="qty">

<button onclick="add('${item}',${rate},-1)">-</button>

<span>${cart[item]?.qty||0}</span>

<button onclick="add('${item}',${rate},1)">+</button>

</div>

</div>

`;

});

document.getElementById("grid").innerHTML=html;

renderPagination(filtered.length);

}

function renderPagination(total){

let pages=Math.ceil(total/perPage);

let start=Math.max(1,currentPage-2);
let end=Math.min(pages,start+4);

let html="";

if(currentPage>1){

html+=`<button onclick="goPage(${currentPage-1})">◀</button>`;

}

for(let i=start;i<=end;i++){

html+=`<button class="${i==currentPage?'active-page':''}" onclick="goPage(${i})">${i}</button>`;

}

if(currentPage<pages){

html+=`<button onclick="goPage(${currentPage+1})">▶</button>`;

}

document.getElementById("pagination").innerHTML=html;

}

function goPage(p){

currentPage=p;

render();

}

function add(item,rate,change){

let product=rows.find(r=>r[1]==item);

let stock=parseInt(product[5]);
let exp=new Date(product[4]);

if(exp < new Date()) return alert("Expired medicine");

if(!cart[item]) cart[item]={qty:0,rate:rate};

let newQty=cart[item].qty+change;

if(newQty>stock) return alert("Stock limit reached");

cart[item].qty=Math.max(newQty,0);

updateCart();
render();

}

function updateCart(){

let html="";
let total=0;

for(let item in cart){

let q=cart[item].qty;
let r=cart[item].rate;

if(q>0){

let t=q*r;

total+=t;

html+=`
<tr>
<td>${item}</td>
<td>${q}</td>
<td>₹${t.toFixed(2)}</td>
</tr>
`;

}

}

document.getElementById("cartItems").innerHTML=html;

document.getElementById("total").innerText="Total ₹"+total.toFixed(2);

}

function placeOrder(){

let shop=document.getElementById("shop").value;
let mobile=document.getElementById("mobile").value;

let items=[];

for(let item in cart){

if(cart[item].qty>0){

items.push({
name:item,
rate:cart[item].rate,
qty:cart[item].qty,
total:cart[item].rate*cart[item].qty
});

}

}

if(items.length===0){
alert("Cart empty");
return;
}

fetch(ORDER_API,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
shop:shop,
mobile:mobile,
items:items
})
});

alert("Order submitted successfully");

cart={};

updateCart();
render();

}

document.getElementById("search").addEventListener("keyup",function(){

currentPage=1;
render();

});

document.getElementById("companyFilter").addEventListener("change",function(){

currentPage=1;
render();

});

</script>

</body>
</html>
