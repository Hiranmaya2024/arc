<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aaradhya Pharmaceuticals Ordering</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{font-family:Poppins;margin:0;background:#f4f6f9}

header{
background:#0b5ed7;color:white;padding:14px 20px;
display:flex;justify-content:space-between;align-items:center;
position:sticky;top:0
}

.cart-btn{
background:#25D366;border:none;color:white;padding:6px 10px;border-radius:6px;cursor:pointer
}

.container{padding:20px;max-width:1400px;margin:auto}

.filters{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}

input,select{padding:10px;border-radius:6px;border:1px solid #ccc}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:18px
}

.card{
background:white;padding:14px;border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
display:flex;flex-direction:column;gap:4px
}

.medicine{font-weight:600;font-size:14px}
.company{font-size:12px;color:#666}
.details{font-size:12px}

.qty{display:flex;justify-content:center;gap:6px;margin-top:6px}

.pagination{
display:flex;justify-content:center;gap:6px;margin-top:20px;flex-wrap:wrap
}

.page-btn{
padding:6px 10px;border:none;background:#ddd;border-radius:4px;cursor:pointer
}

.active-page{background:#25D366;color:white}

.cart-overlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.25);display:none
}

.cart-overlay.active{display:block}

.cart-drawer{
position:fixed;right:-400px;top:0;width:350px;height:100%;
background:white;padding:20px;transition:0.3s;overflow:auto
}

.cart-drawer.open{right:0}

.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);display:none;
justify-content:center;align-items:center
}

.modal-content{
background:white;padding:20px;border-radius:10px;width:320px
}

</style>
</head>

<body>

<header>

<div>Aaradhya Pharmaceuticals Ordering</div>

<button class="cart-btn" onclick="toggleCart()">
Cart (<span id="cartCount">0</span>)
</button>

</header>

<div class="container">

<div class="filters">

<input id="search" placeholder="Search medicine">

<select id="companyFilter">
<option value="">All Companies</option>
</select>

</div>

<div class="grid" id="grid"></div>

<div class="pagination" id="pagination"></div>

</div>

<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>

<div class="cart-drawer" id="cartDrawer">

<h3>Your Cart</h3>

<div id="cartItems"></div>

<br>

<button onclick="openOrderForm()">Place Order</button>

</div>

<!-- ORDER FORM -->

<div class="modal" id="orderModal">

<div class="modal-content">

<h3>Order Details</h3>

<input id="shopName" placeholder="Shop Name"><br><br>
<input id="phoneNumber" placeholder="Phone Number"><br><br>

<button onclick="confirmOrder()">Submit Order</button>
<button onclick="closeOrderForm()">Cancel</button>

</div>

</div>

<script>

const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSHk_KwG4YCKte3jjsuGsXf_vPG_RsPQRexmJl_fIs0_Pjasq7I7g6nlxXskgncP6Xg6ca9__obX-5d/pub?gid=0&single=true&output=csv"

const ORDER_API="https://script.google.com/macros/s/AKfycby3QoqXU5UI_ofm_NX6F7wH4X84hAwArPFMZ4BOkn1KmRs0JpLFRJO91f63YSmupgejOg/exec"

let rows=[]
let cart={}
let currentPage=1
let itemsPerPage=12

fetch(SHEET_URL)
.then(r=>r.text())
.then(data=>{

rows=data.split("\n").slice(1).map(r=>r.split(","))

initCompanies()

render()

})

function initCompanies(){

let companies=[...new Set(rows.map(r=>r[0].trim()))]

let select=document.getElementById("companyFilter")

companies.forEach(c=>{
let opt=document.createElement("option")
opt.value=c
opt.textContent=c
select.appendChild(opt)
})

}

/* FILTER EVENTS */

document.getElementById("search").onkeyup=()=>{currentPage=1;render()}
document.getElementById("companyFilter").onchange=()=>{currentPage=1;render()}

/* RENDER */

function render(){

let search=document.getElementById("search").value.toLowerCase()
let company=document.getElementById("companyFilter").value

let filtered=rows.filter(r=>{

return r[1].toLowerCase().includes(search)
&&(!company||r[0].trim()==company)

})

let start=(currentPage-1)*itemsPerPage
let page=filtered.slice(start,start+itemsPerPage)

let html=""

page.forEach(r=>{

let item=r[1]
let rate=parseFloat(r[6])

html+=`

<div class="card">

<div class="medicine">${item}</div>
<div class="company">${r[0]}</div>

<div class="details">MRP: ₹${r[3]}</div>
<div class="details">Batch: ${r[2]}</div>
<div class="details">Expiry: ${r[4]}</div>
<div class="details">Stock: ${r[5]}</div>

<div class="qty">

<button onclick="add('${item}',${rate},-1)">-</button>

<span>${cart[item]?.qty||0}</span>

<button onclick="add('${item}',${rate},1)">+</button>

</div>

</div>

`

})

document.getElementById("grid").innerHTML=html

renderPagination(filtered.length)

}

/* PAGINATION */

function renderPagination(total){

let pages=Math.ceil(total/itemsPerPage)

let html=""

if(currentPage>1){

html+=`<button class="page-btn" onclick="goPage(${currentPage-1})">⬅</button>`

}

for(let i=1;i<=pages;i++){

html+=`<button class="page-btn ${i==currentPage?'active-page':''}" onclick="goPage(${i})">${i}</button>`

}

if(currentPage<pages){

html+=`<button class="page-btn" onclick="goPage(${currentPage+1})">➡</button>`

}

document.getElementById("pagination").innerHTML=html

}

function goPage(p){

currentPage=p

render()

}

/* CART */

function add(item,rate,change){

if(!cart[item]) cart[item]={qty:0,rate:rate}

cart[item].qty=Math.max(cart[item].qty+change,0)

updateCart()

}

function updateCart(){

let html=""
let count=0

for(let item in cart){

let q=cart[item].qty

if(q>0){

count+=q

html+=item+" x "+q+"<br>"

}

}

document.getElementById("cartItems").innerHTML=html

document.getElementById("cartCount").innerText=count

}

function toggleCart(){

document.getElementById("cartDrawer").classList.toggle("open")

document.getElementById("cartOverlay").classList.toggle("active")

}

/* ORDER FORM */

function openOrderForm(){

document.getElementById("orderModal").style.display="flex"

}

function closeOrderForm(){

document.getElementById("orderModal").style.display="none"

}

/* ORDER SUBMIT */

function confirmOrder(){

let shop=document.getElementById("shopName").value
let phone=document.getElementById("phoneNumber").value

let items=[]

for(let item in cart){

if(cart[item].qty>0){

items.push({
name:item,
qty:cart[item].qty,
rate:cart[item].rate
})

}

}

fetch(ORDER_API,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
shop:shop,
phone:phone,
items:items
})
})

alert("Order submitted successfully")

cart={}

updateCart()

closeOrderForm()

}

</script>

</body>
</html>
