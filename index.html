<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aaradhya Pharma Order System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#f4f6f9;
}

header{
background:#0b5ed7;
color:white;
padding:16px;
text-align:center;
font-weight:600;
font-size:20px;
}

.container{
padding:15px;
max-width:1400px;
margin:auto;
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

.search{
flex:1;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.table-box{
background:white;
border-radius:10px;
overflow:auto;
box-shadow:0 3px 12px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
font-size:13px;
}

th{
background:#f1f3f6;
}

.qty{
display:flex;
align-items:center;
gap:5px;
}

.qty button{
width:28px;
height:28px;
border:none;
background:#0b5ed7;
color:white;
border-radius:4px;
cursor:pointer;
}

.cart{
margin-top:20px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.1);
}

.cart h3{
margin-top:0;
}

.order-btn{
background:#25D366;
color:white;
border:none;
padding:12px;
width:100%;
font-size:16px;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

.loading{
text-align:center;
padding:40px;
font-size:18px;
}

</style>
</head>

<body>

<header>
Aaradhya Pharma Ordering System
</header>

<div class="container">

<div class="controls">

<input type="text" id="search" class="search" placeholder="Search medicine">

</div>

<div class="table-box">

<div id="loading" class="loading">
Loading Stock...
</div>

<table id="table" style="display:none">

<thead>

<tr>
<th>Item</th>
<th>Company</th>
<th>Batch</th>
<th>MRP</th>
<th>Stock</th>
<th>Rate</th>
<th>Qty</th>
</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

</div>

<div class="cart">

<h3>Order Cart</h3>

<div id="cartItems"></div>

<button class="order-btn" onclick="sendWhatsApp()">Send Order on WhatsApp</button>

</div>

</div>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSHk_KwG4YCKte3jjsuGsXf_vPG_RsPQRexmJl_fIs0_Pjasq7I7g6nlxXskgncP6Xg6ca9__obX-5d/pub?gid=0&single=true&output=csv";

let rows=[];
let cart={};

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

rows=data.split("\n").slice(1).map(r=>r.split(","));

render(rows);

document.getElementById("loading").style.display="none";
document.getElementById("table").style.display="table";

});

function render(data){

let html="";

data.forEach((r,i)=>{

if(r.length<7) return;

html+=`
<tr>

<td>${r[1]}</td>
<td>${r[0]}</td>
<td>${r[2]}</td>
<td>${r[3]}</td>
<td>${r[5]}</td>
<td>${r[6]}</td>

<td class="qty">

<button onclick="changeQty(${i},-1)">-</button>

<span id="qty${i}">0</span>

<button onclick="changeQty(${i},1)">+</button>

</td>

</tr>
`;

});

document.getElementById("tbody").innerHTML=html;

}

function changeQty(index,change){

let item=rows[index][1];

if(!cart[item]) cart[item]=0;

cart[item]+=change;

if(cart[item]<0) cart[item]=0;

document.getElementById("qty"+index).innerText=cart[item];

updateCart();

}

function updateCart(){

let html="";

for(let item in cart){

if(cart[item]>0){

html+=`${item} — ${cart[item]}<br>`;

}

}

document.getElementById("cartItems").innerHTML=html;

}

function sendWhatsApp(){

let msg="Order for Aaradhya Pharmaceuticals:%0A%0A";

for(let item in cart){

if(cart[item]>0){

msg+=item+" - "+cart[item]+"%0A";

}

}

window.open("https://wa.me/?text="+msg);

}

document.getElementById("search").addEventListener("keyup",function(){

let text=this.value.toLowerCase();

let filtered=rows.filter(r=>r.join(" ").toLowerCase().includes(text));

render(filtered);

});

</script>

</body>
</html>
