<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aaradhya Pharma Smart Ordering</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#f4f6f9;
}

header{
background:#0b5ed7;
color:white;
padding:16px;
text-align:center;
font-size:20px;
font-weight:600;
}

.container{
max-width:1400px;
margin:auto;
padding:15px;
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

.search,.filter{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
flex:1;
}

.table-box{
background:white;
border-radius:10px;
overflow:auto;
box-shadow:0 3px 12px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
font-size:13px;
}

th{
background:#f1f3f6;
}

.qty{
display:flex;
gap:5px;
align-items:center;
}

.qty button{
width:26px;
height:26px;
border:none;
background:#0b5ed7;
color:white;
border-radius:4px;
}

.low-stock{color:red;font-weight:600;}
.good-stock{color:green;font-weight:600;}

.exp-warning{background:#fff3cd;}
.exp-danger{background:#f8d7da;}

.pagination{
margin-top:15px;
text-align:center;
}

.pagination button{
margin:3px;
padding:6px 10px;
border:none;
background:#0b5ed7;
color:white;
border-radius:4px;
}

.cart{
margin-top:20px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.1);
}

.order-btn{
background:#25D366;
border:none;
color:white;
width:100%;
padding:12px;
border-radius:8px;
font-size:16px;
margin-top:10px;
}

.loading{
text-align:center;
padding:40px;
}

</style>
</head>

<body>

<header>
Aaradhya Pharma Smart Order System
</header>

<div class="container">

<div class="controls">

<input type="text" id="search" class="search" placeholder="Search medicine">

<select id="companyFilter" class="filter">
<option value="">All Companies</option>
</select>

</div>

<div class="table-box">

<div id="loading" class="loading">Loading Stock...</div>

<table id="table" style="display:none">

<thead>
<tr>
<th>Item</th>
<th>Company</th>
<th>Batch</th>
<th>MRP</th>
<th>Expiry</th>
<th>Stock</th>
<th>Rate</th>
<th>Qty</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

<div class="pagination" id="pagination"></div>

<div class="cart">

<h3>Order Cart</h3>

<div id="cartItems"></div>

<button class="order-btn" onclick="sendWhatsApp()">Send Order on WhatsApp</button>

</div>

</div>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSHk_KwG4YCKte3jjsuGsXf_vPG_RsPQRexmJl_fIs0_Pjasq7I7g6nlxXskgncP6Xg6ca9__obX-5d/pub?gid=0&single=true&output=csv";

let rows=[];
let filteredRows=[];
let cart={};

let currentPage=1;
const perPage=20;

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

rows=data.split("\n").slice(1).map(r=>r.split(","));

filteredRows=[...rows];

initCompanyFilter();
renderPage();

document.getElementById("loading").style.display="none";
document.getElementById("table").style.display="table";

});

function initCompanyFilter(){

let companies=[...new Set(rows.map(r=>r[0]))];

let select=document.getElementById("companyFilter");

companies.forEach(c=>{

let opt=document.createElement("option");
opt.value=c;
opt.textContent=c;

select.appendChild(opt);

});

}

function renderPage(){

let start=(currentPage-1)*perPage;
let pageRows=filteredRows.slice(start,start+perPage);

render(pageRows);
renderPagination();

}

function render(data){

let html="";

data.forEach((r,i)=>{

if(r.length<7) return;

let stockClass=r[5]<5?"low-stock":"good-stock";

let expClass="";
let expDate=new Date(r[4]);
let diff=(expDate-new Date())/(1000*60*60*24);

if(diff<90) expClass="exp-danger";
else if(diff<180) expClass="exp-warning";

let index=rows.indexOf(r);

html+=`
<tr class="${expClass}">
<td>${r[1]}</td>
<td>${r[0]}</td>
<td>${r[2]}</td>
<td>${r[3]}</td>
<td>${r[4]}</td>
<td class="${stockClass}">${r[5]}</td>
<td>${r[6]}</td>

<td class="qty">

<button onclick="changeQty(${index},-1)">-</button>
<span id="qty${index}">${cart[r[1]]||0}</span>
<button onclick="changeQty(${index},1)">+</button>

</td>
</tr>
`;

});

document.getElementById("tbody").innerHTML=html;

}

function renderPagination(){

let totalPages=Math.ceil(filteredRows.length/perPage);

let html="";

for(let i=1;i<=totalPages;i++){

html+=`<button onclick="goPage(${i})">${i}</button>`;

}

document.getElementById("pagination").innerHTML=html;

}

function goPage(p){

currentPage=p;
renderPage();

}

function changeQty(index,change){

let item=rows[index][1];

if(!cart[item]) cart[item]=0;

cart[item]+=change;

if(cart[item]<0) cart[item]=0;

document.getElementById("qty"+index).innerText=cart[item];

updateCart();

}

function updateCart(){

let html="";

for(let item in cart){

if(cart[item]>0){

html+=`${item} — ${cart[item]}<br>`;

}

}

document.getElementById("cartItems").innerHTML=html;

}

function sendWhatsApp(){

let msg="Order for Aaradhya Pharmaceuticals:%0A%0A";

for(let item in cart){

if(cart[item]>0){

msg+=item+" - "+cart[item]+"%0A";

}

}

window.open("https://wa.me/?text="+msg);

}

function applyFilters(){

let text=document.getElementById("search").value.toLowerCase();
let company=document.getElementById("companyFilter").value;

filteredRows=rows.filter(r=>{

let matchSearch=r.join(" ").toLowerCase().includes(text);
let matchCompany=!company||r[0]==company;

return matchSearch && matchCompany;

});

currentPage=1;

renderPage();

}

document.getElementById("search").addEventListener("keyup",applyFilters);
document.getElementById("companyFilter").addEventListener("change",applyFilters);

</script>

</body>
</html>
