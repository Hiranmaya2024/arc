<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Aaradhya Retailer Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#f4f6f9;
}

/* SPLASH */

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b5ed7;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
z-index:100;
}

/* LOGIN */

#login{
display:none;
text-align:center;
margin-top:120px;
}

/* HEADER */

header{
background:#0b5ed7;
color:white;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.cart-btn{
background:#25D366;
border:none;
padding:6px 10px;
border-radius:6px;
color:white;
}

/* LAYOUT */

.container{
padding:20px;
max-width:1300px;
margin:auto;
}

.filters{
display:flex;
gap:10px;
margin-bottom:10px;
}

input,select{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:16px;
}

.card{
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.medicine{
font-weight:600;
}

.company{
font-size:12px;
color:#666;
}

.details{
font-size:12px;
}

.qty{
display:flex;
gap:6px;
justify-content:center;
margin-top:6px;
}

/* PAGINATION */

.pagination{
margin-top:20px;
display:flex;
justify-content:center;
gap:6px;
}

/* CART */

.cart{
position:fixed;
right:-380px;
top:0;
width:350px;
height:100%;
background:white;
padding:20px;
transition:.3s;
overflow:auto;
}

.cart.open{
right:0;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.25);
display:none;
}

.overlay.active{
display:block;
}

</style>

</head>

<body>

<div id="splash">Aaradhya Pharmaceuticals</div>

<div id="login">

<h2>Retailer Login</h2>

<input id="mobileInput" placeholder="Enter Mobile Number">

<br><br>

<button onclick="login()">Login</button>

</div>

<div id="app" style="display:none">

<header>

<div>Aaradhya Ordering</div>

<button class="cart-btn" onclick="toggleCart()">
Cart (<span id="cartCount">0</span>)
</button>

</header>

<div class="container">

<div class="filters">

<input id="search" placeholder="Search Medicine">

<select id="companyFilter">
<option value="">All Companies</option>
</select>

</div>

<div class="grid" id="grid"></div>

<div class="pagination" id="pagination"></div>

</div>

</div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="cart" id="cart">

<h3>Cart</h3>

<table width="100%">

<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>

<tbody id="cartItems"></tbody>

</table>

<h3 id="cartTotal">₹0</h3>

<button onclick="placeOrder()">Place Order</button>

</div>

<script>

const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSHk_KwG4YCKte3jjsuGsXf_vPG_RsPQRexmJl_fIs0_Pjasq7I7g6nlxXskgncP6Xg6ca9__obX-5d/pub?gid=0&single=true&output=csv"

const ORDER_API="https://script.google.com/macros/s/AKfycby3QoqXU5UI_ofm_NX6F7wH4X84hAwArPFMZ4BOkn1KmRs0JpLFRJO91f63YSmupgejOg/exec"

let rows=[]
let cart={}
let currentPage=1
let itemsPerPage=12

/* SPLASH */

setTimeout(()=>{

document.getElementById("splash").style.display="none"

let mobile=localStorage.getItem("retailerMobile")

if(mobile){

startApp()

}else{

document.getElementById("login").style.display="block"

}

},2000)

/* LOGIN */

function login(){

let mobile=document.getElementById("mobileInput").value

if(!mobile){
alert("Enter mobile")
return
}

localStorage.setItem("retailerMobile",mobile)

startApp()

}

function startApp(){

document.getElementById("login").style.display="none"

document.getElementById("app").style.display="block"

}

/* LOAD INVENTORY */

fetch(SHEET_URL)
.then(r=>r.text())
.then(data=>{

rows=data.split("\n").slice(1).map(r=>r.split(","))

initCompanies()

render()

})

function initCompanies(){

let companies=[...new Set(rows.map(r=>r[0].trim()))]

let select=document.getElementById("companyFilter")

companies.forEach(c=>{

let o=document.createElement("option")

o.value=c

o.textContent=c

select.appendChild(o)

})

}

/* RENDER */

function render(){

let search=document.getElementById("search").value.toLowerCase()

let company=document.getElementById("companyFilter").value

let filtered=rows.filter(r=>{

let name=r[1].toLowerCase()

return name.includes(search)&&(!company||r[0].trim()==company)

})

let start=(currentPage-1)*itemsPerPage

let page=filtered.slice(start,start+itemsPerPage)

let html=""

page.forEach(r=>{

let item=r[1]

let rate=parseFloat(r[6])

html+=`

<div class="card">

<div class="medicine">${item}</div>

<div class="company">${r[0]}</div>

<div class="details">MRP ₹${r[3]}</div>
<div class="details">Rate ₹${rate}</div>
<div class="details">Batch ${r[2]}</div>
<div class="details">Expiry ${r[4]}</div>

<div class="qty">

<button onclick="add('${item}',${rate},-1)">-</button>

<span>${cart[item]?.qty||0}</span>

<button onclick="add('${item}',${rate},1)">+</button>

</div>

</div>

`

})

document.getElementById("grid").innerHTML=html

}

/* CART */

function add(item,rate,change){

if(!cart[item]) cart[item]={qty:0,rate:rate}

cart[item].qty=Math.max(cart[item].qty+change,0)

updateCart()

}

function updateCart(){

let html=""
let total=0
let count=0

for(let item in cart){

let q=cart[item].qty
let t=q*cart[item].rate

if(q>0){

total+=t
count+=q

html+=`<tr><td>${item}</td><td>${q}</td><td>${t}</td></tr>`

}

}

document.getElementById("cartItems").innerHTML=html

document.getElementById("cartTotal").innerText="₹"+total

document.getElementById("cartCount").innerText=count

}

function toggleCart(){

document.getElementById("cart").classList.toggle("open")

document.getElementById("overlay").classList.toggle("active")

}

/* PLACE ORDER */

function placeOrder(){

let mobile=localStorage.getItem("retailerMobile")

let items=[]

for(let i in cart){

if(cart[i].qty>0){

items.push({

name:i,
qty:cart[i].qty,
rate:cart[i].rate,
total:cart[i].qty*cart[i].rate

})

}

}

fetch(ORDER_API,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
mobile:mobile,
items:items
})
})

alert("Order placed successfully")

cart={}
updateCart()
toggleCart()

}

</script>

</body>
</html>
