<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Aaradhya Pharmaceuticals Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#f5f6fa
}

/* SPLASH */

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b5ed7;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
z-index:100
}

/* HEADER */

header{
background:#0b5ed7;
color:white;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center
}

.cart-btn{
background:#25D366;
border:none;
padding:6px 12px;
border-radius:6px;
color:white
}

/* LAYOUT */

.container{
padding:20px;
max-width:1300px;
margin:auto
}

.filters{
display:flex;
gap:10px;
margin-bottom:15px
}

input,select{
padding:10px;
border-radius:6px;
border:1px solid #ccc
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:16px
}

.card{
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08)
}

.medicine{
font-weight:600
}

.company{
font-size:12px;
color:#666
}

.details{
font-size:12px
}

.qty{
display:flex;
gap:6px;
justify-content:center;
margin-top:6px
}

.qty button{
width:26px
}

/* PAGINATION */

.pagination{
margin-top:20px;
display:flex;
justify-content:center;
gap:6px
}

.active-page{
background:#25D366
}

/* CART */

.cart{
position:fixed;
right:-380px;
top:0;
width:350px;
height:100%;
background:white;
padding:20px;
transition:.3s;
overflow:auto
}

.cart.open{
right:0
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.25);
display:none
}

.overlay.active{
display:block
}

/* HISTORY */

.history{
margin-top:30px
}

.order-card{
background:white;
padding:12px;
margin-bottom:10px;
border-radius:8px
}

</style>
</head>

<body>

<div id="splash">
Aaradhya Pharmaceuticals
</div>

<header>

<div>Aaradhya Portal</div>

<button class="cart-btn" onclick="toggleCart()">
Cart (<span id="cartCount">0</span>)
</button>

</header>

<div class="container">

<div class="filters">

<input id="search" placeholder="Search Medicine">

<select id="companyFilter">
<option value="">All Companies</option>
</select>

</div>

<div class="grid" id="grid"></div>

<div class="pagination" id="pagination"></div>

<div class="history">

<h3>Your Order History</h3>

<div id="orderHistory"></div>

</div>

</div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="cart" id="cart">

<h3>Cart</h3>

<table width="100%">

<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>

<tbody id="cartItems"></tbody>

</table>

<h3 id="cartTotal">₹0</h3>

<button onclick="placeOrder()">Place Order</button>

</div>

<script>

/* CONFIG */

const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSHk_KwG4YCKte3jjsuGsXf_vPG_RsPQRexmJl_fIs0_Pjasq7I7g6nlxXskgncP6Xg6ca9__obX-5d/pub?gid=0&single=true&output=csv"

const ORDER_API="YOUR_APPS_SCRIPT"

/* VARIABLES */

let rows=[]
let cart={}
let currentPage=1
let itemsPerPage=12

/* SPLASH */

setTimeout(()=>{
document.getElementById("splash").style.display="none"
},2000)

/* LOAD DATA */

fetch(SHEET_URL)
.then(r=>r.text())
.then(data=>{
rows=data.split("\n").slice(1).map(r=>r.split(","))
initCompanies()
render()
})

/* COMPANY LIST */

function initCompanies(){

let companies=[...new Set(rows.map(r=>r[0].trim()))]

let select=document.getElementById("companyFilter")

companies.forEach(c=>{
let o=document.createElement("option")
o.value=c
o.textContent=c
select.appendChild(o)
})

}

/* RESPONSIVE PAGINATION */

function calcItems(){

let width=document.getElementById("grid").offsetWidth

let cols=Math.max(Math.floor(width/230),1)

let rowsCount=Math.floor((window.innerHeight-300)/180)

itemsPerPage=cols*rowsCount

}

/* RENDER */

function render(){

calcItems()

let search=document.getElementById("search").value.toLowerCase()

let company=document.getElementById("companyFilter").value

let filtered=rows.filter(r=>{

let name=r[1].toLowerCase()

return name.includes(search)&&(!company||r[0].trim()==company)

})

let start=(currentPage-1)*itemsPerPage

let page=filtered.slice(start,start+itemsPerPage)

let html=""

page.forEach(r=>{

let item=r[1]
let rate=parseFloat(r[6])

html+=`

<div class="card">

<div class="medicine">${item}</div>

<div class="company">${r[0]}</div>

<div class="details">MRP ₹${r[3]}</div>
<div class="details">Rate ₹${rate}</div>
<div class="details">Batch ${r[2]}</div>
<div class="details">Expiry ${r[4]}</div>

<div class="qty">

<button onclick="add('${item}',${rate},-1)">-</button>

<span>${cart[item]?.qty||0}</span>

<button onclick="add('${item}',${rate},1)">+</button>

</div>

</div>

`

})

document.getElementById("grid").innerHTML=html

pagination(filtered.length)

}

/* PAGINATION */

function pagination(total){

let pages=Math.ceil(total/itemsPerPage)

let html=""

if(currentPage>1)
html+=`<button onclick="go(${currentPage-1})">⬅</button>`

for(let i=1;i<=pages;i++){

if(Math.abs(i-currentPage)<=2)
html+=`<button onclick="go(${i})">${i}</button>`

}

if(currentPage<pages)
html+=`<button onclick="go(${currentPage+1})">➡</button>`

document.getElementById("pagination").innerHTML=html

}

function go(p){
currentPage=p
render()
}

/* CART */

function add(item,rate,change){

if(!cart[item]) cart[item]={qty:0,rate:rate}

cart[item].qty=Math.max(cart[item].qty+change,0)

updateCart()

render()

}

function updateCart(){

let html=""
let total=0
let count=0

for(let item in cart){

let q=cart[item].qty
let t=q*cart[item].rate

if(q>0){

total+=t
count+=q

html+=`<tr><td>${item}</td><td>${q}</td><td>${t}</td></tr>`

}

}

document.getElementById("cartItems").innerHTML=html
document.getElementById("cartTotal").innerText="₹"+total
document.getElementById("cartCount").innerText=count

}

/* CART UI */

function toggleCart(){

document.getElementById("cart").classList.toggle("open")
document.getElementById("overlay").classList.toggle("active")

}

/* ORDER */

function placeOrder(){

let items=[]

for(let i in cart){

if(cart[i].qty>0)
items.push(cart[i])

}

fetch(ORDER_API,{
method:"POST",
body:JSON.stringify(items)
})

saveHistory(items)

alert("Order Placed")

cart={}

updateCart()

toggleCart()

}

/* ORDER HISTORY */

function saveHistory(order){

let history=JSON.parse(localStorage.getItem("history")||"[]")

history.unshift({
date:new Date().toLocaleString(),
items:order
})

localStorage.setItem("history",JSON.stringify(history))

showHistory()

}

function showHistory(){

let history=JSON.parse(localStorage.getItem("history")||"[]")

let html=""

history.forEach(o=>{

html+=`
<div class="order-card">

<div>${o.date}</div>

</div>
`

})

document.getElementById("orderHistory").innerHTML=html

}

showHistory()

/* FILTER EVENTS */

document.getElementById("search").onkeyup=()=>{
currentPage=1
render()
}

document.getElementById("companyFilter").onchange=()=>{
currentPage=1
render()
}

window.onresize=()=>{
currentPage=1
render()
}

</script>

</body>
</html>
