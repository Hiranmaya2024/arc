<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>Aaradhya Pharma Ordering</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ─── THEMES ─── */
[data-theme="dark"] {
  --bg:        #0b0f1a;
  --surface:   #111827;
  --surface2:  #1a2235;
  --border:    rgba(255,255,255,0.07);
  --accent:    #00e5b0;
  --accent2:   #0099ff;
  --text:      #e8edf5;
  --muted:     #6b7a99;
  --danger:    #ff4d6d;
  --header-bg: rgba(11,15,26,0.88);
  --glow1:     rgba(0,229,176,0.08);
  --glow2:     rgba(0,153,255,0.06);
}
[data-theme="light"] {
  --bg:        #f0f4f8;
  --surface:   #ffffff;
  --surface2:  #e4ecf4;
  --border:    rgba(0,0,0,0.09);
  --accent:    #00b894;
  --accent2:   #0099ff;
  --text:      #1a2235;
  --muted:     #7a8aaa;
  --danger:    #e74c3c;
  --header-bg: rgba(240,244,248,0.92);
  --glow1:     rgba(0,184,148,0.06);
  --glow2:     rgba(0,153,255,0.04);
}
[data-theme="rose"] {
  --bg:        #0f0a0e;
  --surface:   #1a1018;
  --surface2:  #251820;
  --border:    rgba(255,255,255,0.07);
  --accent:    #ff6b9d;
  --accent2:   #c44dff;
  --text:      #f5e6ee;
  --muted:     #9a7a8a;
  --danger:    #ff4d6d;
  --header-bg: rgba(15,10,14,0.88);
  --glow1:     rgba(255,107,157,0.08);
  --glow2:     rgba(196,77,255,0.06);
}
[data-theme="amber"] {
  --bg:        #0f0d08;
  --surface:   #1a1710;
  --surface2:  #252010;
  --border:    rgba(255,255,255,0.07);
  --accent:    #f59e0b;
  --accent2:   #ef4444;
  --text:      #f5f0e0;
  --muted:     #9a8a6a;
  --danger:    #ef4444;
  --header-bg: rgba(15,13,8,0.88);
  --glow1:     rgba(245,158,11,0.08);
  --glow2:     rgba(239,68,68,0.06);
}

body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% -10%, var(--glow1) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, var(--glow2) 0%, transparent 60%);
  transition: background 0.3s, color 0.3s;
}

/* ─── HEADER ─── */
header {
  position: sticky; top: 0; z-index: 100;
  background: var(--header-bg);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px; height: 64px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-icon {
  width: 34px; height: 34px; border-radius: 9px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.brand-name { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }
.brand-sub  { font-size: 10px; color: var(--muted); font-weight: 400; letter-spacing: 0.5px; text-transform: uppercase; }

.header-right { display: flex; align-items: center; gap: 8px; }

/* Theme switcher */
.theme-switcher {
  display: flex; align-items: center; gap: 4px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 5px;
}
.theme-btn {
  width: 22px; height: 22px; border-radius: 6px;
  border: 2px solid transparent; cursor: pointer;
  transition: all 0.2s; flex-shrink: 0;
}
.theme-btn:hover  { transform: scale(1.2); }
.theme-btn.active { border-color: var(--text); }
.theme-btn[data-t="dark"]  { background: #0b0f1a; border-color: #444; }
.theme-btn[data-t="light"] { background: #f0f4f8; border-color: #ccc; }
.theme-btn[data-t="rose"]  { background: linear-gradient(135deg,#ff6b9d,#c44dff); }
.theme-btn[data-t="amber"] { background: linear-gradient(135deg,#f59e0b,#ef4444); }
.theme-btn.active { border-color: var(--text) !important; box-shadow: 0 0 0 1px var(--accent); }

/* Cart button */
#cartBtn {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 8px 14px; border-radius: 10px;
  font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
#cartBtn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,176,0.08); }
.cart-badge {
  background: var(--accent); color: #000;
  font-size: 10px; font-weight: 700; font-family: 'Space Mono', monospace;
  padding: 2px 6px; border-radius: 20px; min-width: 20px; text-align: center; line-height: 1.4;
}

/* ─── CONTAINER ─── */
.container { max-width: 1280px; margin: 0 auto; padding: 28px 16px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.section-title  { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
.item-count {
  font-family: 'Space Mono', monospace; font-size: 12px; color: var(--accent);
  background: rgba(0,229,176,0.08); border: 1px solid rgba(0,229,176,0.2);
  padding: 3px 10px; border-radius: 20px;
}

/* ─── GRID ─── */
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }

/* ─── CARD ─── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 16px;
  transition: all 0.25s ease; position: relative; overflow: hidden;
  animation: fadeUp 0.4s ease both;
  display: flex; flex-direction: column; gap: 12px;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.card:hover {
  border-color: rgba(0,229,176,0.25); background: var(--surface2);
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(0,229,176,0.1);
}
.card:hover::before { opacity: 1; }

.card h4 { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; margin: 0; }

.card-prices { display: flex; align-items: center; gap: 14px; }
.price-block  { display: flex; flex-direction: column; gap: 2px; }
.price-block .meta-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); font-weight: 500; }
.price-block .price-val  { font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; color: var(--accent); }
.price-block .mrp-val    { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: var(--text); }
.price-divider { width: 1px; height: 32px; background: var(--border); }

/* ─── QTY BOX ─── */
.qty-box {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.03); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}
.qty-box button {
  background: transparent; border: none; color: var(--accent);
  font-size: 18px; font-weight: 700; width: 38px; height: 38px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s; font-family: 'Space Mono', monospace;
}
.qty-box button:hover  { background: rgba(0,229,176,0.1); }
.qty-box button:active { background: rgba(0,229,176,0.2); }
.qty-box span {
  font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700;
  color: var(--text); min-width: 32px; text-align: center;
}

/* ─── PAGINATION ─── */
.pagination { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 36px; padding: 16px; }
.pagination button {
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600;
  padding: 9px 20px; border-radius: 10px; cursor: pointer; transition: all 0.2s;
}
.pagination button:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,176,0.06); }
#pageNum {
  font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted);
  background: var(--surface); border: 1px solid var(--border);
  padding: 9px 16px; border-radius: 10px; min-width: 80px; text-align: center;
}

/* ─── MODALS ─── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(5,8,16,0.85);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal-content {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 26px;
  width: 92%; max-width: 540px; max-height: 88vh; overflow-y: auto;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1) both;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
}
.modal-header h3 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }

#cartItems { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.cart-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 14px; gap: 10px;
}
.cart-row-name  { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; line-height: 1.4; }
.cart-row-qty   { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); white-space: nowrap; }
.cart-row-price { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: var(--accent); white-space: nowrap; }

.cart-total {
  background: rgba(0,229,176,0.06); border: 1px solid rgba(0,229,176,0.2);
  border-radius: 12px; padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;
}
.cart-total-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
.cart-total-value { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: var(--accent); }

.modal-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
  display: flex; align-items: center; gap: 7px; border: none;
  font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600;
  padding: 10px 16px; border-radius: 10px; cursor: pointer;
  transition: all 0.2s; flex: 1; justify-content: center; min-width: 110px;
}
.btn-primary { background: rgba(0,229,176,0.12); border: 1px solid rgba(0,229,176,0.3); color: var(--accent); }
.btn-primary:hover { background: rgba(0,229,176,0.22); transform: translateY(-1px); }
.btn-wa  { background: rgba(37,211,102,0.12); border: 1px solid rgba(37,211,102,0.3); color: #25d366; }
.btn-wa:hover { background: rgba(37,211,102,0.22); transform: translateY(-1px); }
.btn-close { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--muted); flex: 0; min-width: 80px; }
.btn-close:hover { background: rgba(255,255,255,0.08); color: var(--text); }

.shop-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.shop-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
.shop-input {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: 'Sora', sans-serif; font-size: 14px;
  padding: 10px 14px; outline: none; transition: border-color 0.2s;
}
.shop-input:focus { border-color: var(--accent); }
.shop-input::placeholder { color: var(--muted); }
.shop-error { font-size: 12px; color: var(--danger); margin-top: -6px; margin-bottom: 6px; }

.preview-shop-block {
  background: rgba(0,229,176,0.06); border: 1px solid rgba(0,229,176,0.2);
  border-radius: 12px; padding: 14px 16px; margin-bottom: 16px;
  display: flex; flex-direction: column; gap: 6px;
}
.preview-shop-row    { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.preview-shop-label  { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; min-width: 60px; }
.preview-shop-value  { color: var(--text); font-weight: 600; }
.preview-items-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }
.preview-items       { display: flex; flex-direction: column; gap: 8px; max-height: 240px; overflow-y: auto; margin-bottom: 16px; }

.empty-cart      { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
.empty-cart-icon { font-size: 40px; margin-bottom: 12px; }

.loading { display: flex; align-items: center; justify-content: center; padding: 80px 20px; color: var(--muted); font-size: 14px; gap: 12px; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }

.card:nth-child(1)  { animation-delay: 0.02s; }
.card:nth-child(2)  { animation-delay: 0.04s; }
.card:nth-child(3)  { animation-delay: 0.06s; }
.card:nth-child(4)  { animation-delay: 0.08s; }
.card:nth-child(5)  { animation-delay: 0.10s; }
.card:nth-child(6)  { animation-delay: 0.12s; }
.card:nth-child(7)  { animation-delay: 0.14s; }
.card:nth-child(8)  { animation-delay: 0.16s; }
.card:nth-child(9)  { animation-delay: 0.18s; }
.card:nth-child(10) { animation-delay: 0.20s; }

@keyframes fadeUp  { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideUp { from { opacity:0; transform:translateY(24px) scale(0.98); } to { opacity:1; transform:translateY(0) scale(1); } }
@keyframes spin    { to { transform:rotate(360deg); } }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">💊</div>
    <div>
      <div class="brand-name">Aaradhya Pharma</div>
      <div class="brand-sub">Ordering Portal</div>
    </div>
  </div>
  <div class="header-right">
    <div class="theme-switcher">
      <button class="theme-btn" data-t="dark"  onclick="setTheme('dark')"  title="Dark"></button>
      <button class="theme-btn" data-t="light" onclick="setTheme('light')" title="Light"></button>
      <button class="theme-btn" data-t="rose"  onclick="setTheme('rose')"  title="Rose"></button>
      <button class="theme-btn" data-t="amber" onclick="setTheme('amber')" title="Amber"></button>
    </div>
    <button id="cartBtn" onclick="openCart()">
      🛒 Cart <span class="cart-badge" id="cartCount">0</span>
    </button>
  </div>
</header>

<div class="container">
  <div class="section-header">
    <span class="section-title">Products</span>
    <span class="item-count" id="itemCount">—</span>
  </div>
  <div id="items" class="grid">
    <div class="loading" style="grid-column:1/-1">
      <div class="spinner"></div> Loading catalogue…
    </div>
  </div>
  <div class="pagination">
    <button onclick="prevPage()">← Prev</button>
    <span id="pageNum">Page 1</span>
    <button onclick="nextPage()">Next →</button>
  </div>
</div>

<!-- CART MODAL -->
<div id="cartModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header"><h3>🛒 Order Summary</h3></div>
    <div id="cartItems"></div>
    <div class="cart-total">
      <span class="cart-total-label">Grand Total</span>
      <span class="cart-total-value" id="total">₹0</span>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="openShopModal()">✔ Place Order</button>
      <button class="btn btn-close"   onclick="closeCart()">Close</button>
    </div>
  </div>
</div>

<!-- SHOP DETAILS MODAL -->
<div id="shopModal" class="modal-overlay" style="z-index:1100">
  <div class="modal-content">
    <div class="modal-header"><h3>📋 Shop Details</h3></div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:20px;">Enter your details to place the order.</p>
    <div class="shop-field">
      <label class="shop-label">Shop Name</label>
      <input type="text" id="shopName" class="shop-input" placeholder="e.g. Ravi Medical Store" />
    </div>
    <div class="shop-field">
      <label class="shop-label">Contact Number</label>
      <input type="tel" id="shopContact" class="shop-input" placeholder="e.g. 9876543210" />
    </div>
    <div id="shopError" class="shop-error" style="display:none;">Please fill in both fields.</div>
    <div class="modal-actions" style="margin-top:20px;">
      <button class="btn btn-primary" onclick="confirmShopAndProceed()">✔ Confirm & Proceed</button>
      <button class="btn btn-close"   onclick="closeShopModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- ORDER PREVIEW MODAL -->
<div id="orderPreviewModal" class="modal-overlay" style="z-index:1200">
  <div class="modal-content">
    <div class="modal-header"><h3>✅ Order Preview</h3></div>
    <div id="orderPreviewBody"></div>
    <div class="modal-actions" style="margin-top:20px;">
      <button class="btn btn-primary" onclick="downloadPDF()">⬇ Download PDF</button>
      <button class="btn btn-wa"      onclick="shareWhatsApp()">💬 WhatsApp</button>
      <button class="btn btn-close"   onclick="closeOrderPreview()">Close</button>
    </div>
  </div>
</div>

<script>
// ─── THEME ───
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.t === t));
  try { localStorage.setItem('ap-theme', t); } catch(e) {}
}
(function() {
  let saved = 'dark';
  try { saved = localStorage.getItem('ap-theme') || 'dark'; } catch(e) {}
  setTheme(saved);
})();

// ─── CONFIG ───
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbys0kg-vLBebvLNWUtpE3qFYhCdcyX2H-Cc4ixHLBZF7iGltPkzWz_3fEWxaNN4hVsd-A/exec";
const sheetURL        = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRIA-e9LgjI3ZEthvS_-N-XsurvTJu_XrxpWnIypbqMXNXLB95DaFG1qXv9kvTrrU4_0Fw5ZjVDxxZc/pub?gid=1990410876&single=true&output=csv";
const PROXY           = "https://api.allorigins.win/raw?url=";

let data = [], cart = [], currentPage = 1;
const perPage = 10;

// ─── HELPERS ───
function parseStock(v) { const n = parseInt(v); return isNaN(n) ? 0 : n; }

function mapRow(cols, i) {
  const stock = parseStock(cols[2]);
  return {
    rowIndex: i + 2, dataIndex: i,
    name:   String(cols[1] || '').trim(),
    stock, originalStock: stock,
    mrp:    String(cols[4] || '').trim(),
    rate:   String(cols[5] || '').trim(),
    batch:  String(cols[8] || '').trim()
  };
}

function parseCSV(text) {
  return text.split('\n').slice(1)
    .filter(r => r.trim())
    .map((row, i) => mapRow(row.split(','), i))
    .filter(item => item.name !== '');
}

// JSONP — bypasses CORS for Apps Script
function fetchViaJSONP(url) {
  return new Promise((resolve, reject) => {
    const cb = '__gs_' + Date.now();
    const s  = document.createElement('script');
    const t  = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 10000);
    function cleanup() {
      clearTimeout(t); delete window[cb];
      if (s.parentNode) s.parentNode.removeChild(s);
    }
    window[cb] = d => { cleanup(); resolve(d); };
    s.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
    s.onerror = () => { cleanup(); reject(new Error('Script load error')); };
    document.head.appendChild(s);
  });
}

// ─── LOAD DATA ───
async function loadData() {
  try {
    // 1. Try JSONP (live stock via Apps Script)
    try {
      const rows = await fetchViaJSONP(APPS_SCRIPT_URL);
      data = rows.slice(1).filter(c => c[1] && String(c[1]).trim()).map(mapRow);
      console.log('✅ JSONP:', data.length, 'items');
      return render();
    } catch(e) { console.warn('JSONP failed:', e.message); }

    // 2. CSV via CORS proxy
    try {
      const res  = await fetch(PROXY + encodeURIComponent(sheetURL));
      const text = await res.text();
      data = parseCSV(text);
      console.log('✅ CSV proxy:', data.length, 'items');
      return render();
    } catch(e) { console.warn('CSV proxy failed:', e.message); }

    // 3. Direct CSV (works when served over HTTP)
    const res  = await fetch(sheetURL);
    const text = await res.text();
    data = parseCSV(text);
    console.log('✅ Direct CSV:', data.length, 'items');
    render();

  } catch(err) {
    console.error('Load error:', err);
    document.getElementById('items').innerHTML =
      `<div class="loading" style="grid-column:1/-1;color:var(--danger)">
        ⚠ Could not load products. Check your internet connection and reload.
       </div>`;
  }
}

// ─── RENDER ───
function render() {
  const start     = (currentPage - 1) * perPage;
  const pageData  = data.slice(start, start + perPage);
  const container = document.getElementById('items');
  container.innerHTML = '';
  document.getElementById('itemCount').textContent = data.length + ' items';

  pageData.forEach(item => {
    const cartItem = cart.find(i => i.dataIndex === item.dataIndex);
    const qty = cartItem ? cartItem.qty : 0;

    const div = document.createElement('div');
    div.className   = 'card';
    div.dataset.idx = item.dataIndex;

    div.innerHTML = `
      <h4>${item.name}</h4>
      <div class="card-prices">
        <div class="price-block">
          <span class="meta-label">Rate</span>
          <span class="price-val">₹${item.rate}</span>
        </div>
        <div class="price-divider"></div>
        <div class="price-block">
          <span class="meta-label">MRP</span>
          <span class="mrp-val">₹${item.mrp}</span>
        </div>
      </div>
      <div class="qty-box">
        <button onclick="decreaseQty(${item.dataIndex})">−</button>
        <span data-qty>${qty}</span>
        <button onclick="increaseQty(${item.dataIndex})">+</button>
      </div>`;

    container.appendChild(div);
  });

  document.getElementById('pageNum').innerText = 'Page ' + currentPage;
}

// ─── PAGINATION ───
function nextPage() {
  if (currentPage * perPage < data.length) { currentPage++; render(); scrollTo({top:0,behavior:'smooth'}); }
}
function prevPage() {
  if (currentPage > 1) { currentPage--; render(); scrollTo({top:0,behavior:'smooth'}); }
}

// ─── QTY ───
function increaseQty(idx) {
  const item = data[idx]; if (!item) return;
  const stock = parseStock(item.stock); if (stock <= 0) return;
  const ex = cart.find(i => i.dataIndex === idx);
  if (ex) ex.qty++; else cart.push({...item, qty: 1});
  item.stock = stock - 1;
  updateCartCount(); updateCardDisplay(idx);
}

function decreaseQty(idx) {
  const item = data[idx]; if (!item) return;
  const ci = cart.findIndex(i => i.dataIndex === idx); if (ci === -1) return;
  cart[ci].qty--;
  item.stock = parseStock(item.stock) + 1;
  if (cart[ci].qty <= 0) cart.splice(ci, 1);
  updateCartCount(); updateCardDisplay(idx);
}

function updateCardDisplay(idx) {
  const cartItem = cart.find(i => i.dataIndex === idx);
  const qty  = cartItem ? cartItem.qty : 0;
  const card = document.querySelector(`.card[data-idx="${idx}"]`);
  if (!card) return;
  const span = card.querySelector('[data-qty]');
  if (span) span.textContent = qty;
}

function updateCartCount() {
  document.getElementById('cartCount').innerText = cart.reduce((s,i) => s + i.qty, 0);
}

// ─── CART MODAL ───
function openCart() {
  const div = document.getElementById('cartItems');
  div.innerHTML = '';
  let total = 0;
  if (!cart.length) {
    div.innerHTML = `<div class="empty-cart"><div class="empty-cart-icon">🛒</div>Your cart is empty</div>`;
  } else {
    cart.forEach(item => {
      const value = item.rate * item.qty; total += value;
      div.innerHTML += `
        <div class="cart-row">
          <span class="cart-row-name">${item.name}</span>
          <span class="cart-row-qty">× ${item.qty}</span>
          <span class="cart-row-price">₹${value}</span>
        </div>`;
    });
  }
  document.getElementById('total').innerText = '₹' + total;
  document.getElementById('cartModal').classList.add('open');
}
function closeCart() { document.getElementById('cartModal').classList.remove('open'); }

// ─── SHOP MODAL ───
let currentShopName = '', currentShopContact = '';

function openShopModal() {
  if (!cart.length) return;
  document.getElementById('shopError').style.display = 'none';
  document.getElementById('shopName').value    = currentShopName;
  document.getElementById('shopContact').value = currentShopContact;
  document.getElementById('shopModal').classList.add('open');
}
function closeShopModal() { document.getElementById('shopModal').classList.remove('open'); }

function confirmShopAndProceed() {
  const name    = document.getElementById('shopName').value.trim();
  const contact = document.getElementById('shopContact').value.trim();
  if (!name || !contact) { document.getElementById('shopError').style.display = 'block'; return; }
  currentShopName    = name;
  currentShopContact = contact;
  closeShopModal();
  // Write stock back to sheet
  if (APPS_SCRIPT_URL) {
    const updates = cart.map(ci => ({ row: data[ci.dataIndex].rowIndex, stock: parseStock(data[ci.dataIndex].stock) }));
    fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(updates) })
      .catch(e => console.warn('Stock sync failed:', e));
  }
  showOrderPreview();
}

// ─── ORDER PREVIEW ───
function showOrderPreview() {
  const body = document.getElementById('orderPreviewBody');
  let total = 0, itemsHTML = '';
  cart.forEach(item => {
    const v = item.rate * item.qty; total += v;
    itemsHTML += `
      <div class="cart-row">
        <span class="cart-row-name">${item.name}</span>
        <span class="cart-row-qty">× ${item.qty}</span>
        <span class="cart-row-price">₹${v}</span>
      </div>`;
  });
  body.innerHTML = `
    <div class="preview-shop-block">
      <div class="preview-shop-row"><span class="preview-shop-label">Shop</span><span class="preview-shop-value">${currentShopName}</span></div>
      <div class="preview-shop-row"><span class="preview-shop-label">Contact</span><span class="preview-shop-value">${currentShopContact}</span></div>
    </div>
    <div class="preview-items-title">Ordered Items</div>
    <div class="preview-items">${itemsHTML}</div>
    <div class="cart-total">
      <span class="cart-total-label">Grand Total</span>
      <span class="cart-total-value">₹${total}</span>
    </div>`;
  document.getElementById('orderPreviewModal').classList.add('open');
}
function closeOrderPreview() { document.getElementById('orderPreviewModal').classList.remove('open'); }

// ─── PDF ───
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y = 14, total = 0;
  doc.setFontSize(16); doc.text('Aaradhya Pharma - Order', 10, y); y += 10;
  doc.setFontSize(11);
  doc.text('Shop: ' + currentShopName, 10, y); y += 7;
  doc.text('Contact: ' + currentShopContact, 10, y); y += 10;
  doc.setFontSize(12);
  cart.forEach(item => {
    const v = item.rate * item.qty; total += v;
    doc.text(item.name + ' - Qty: ' + item.qty + ' - Rs.' + v, 10, y); y += 8;
  });
  doc.setFontSize(13); doc.text('Total: Rs.' + total, 10, y + 4);
  doc.save('order.pdf');
}

// ─── WHATSAPP ───
function shareWhatsApp() {
  let text = `*Aaradhya Pharma Order*\nShop: ${currentShopName}\nContact: ${currentShopContact}\n\n`;
  let total = 0;
  cart.forEach(item => {
    const v = item.rate * item.qty; total += v;
    text += `${item.name} - Qty: ${item.qty} - Rs.${v}\n`;
  });
  text += `\n*Total: Rs.${total}*`;
  window.open('https://wa.me/?text=' + encodeURIComponent(text));
}

// ─── INIT ───
loadData();
</script>
